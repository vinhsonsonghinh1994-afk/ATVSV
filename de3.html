<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:#eef2f7;padding:16px;color:#1e293b}
.container{max-width:1300px;margin:0 auto;background:white;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.1);overflow:hidden;padding:20px 24px 32px}

.title{font-size:24px;font-weight:800;color:#1e3a8a;text-transform:uppercase}

.mode-label input{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.start-input{display:flex;align-items:center;gap:7px;font-size:14px}
.start-input input{width:65px;padding:5px 8px;border-radius:30px;border:1px solid #cbd5e1;text-align:center;font-size:.9rem}
.apply-btn{background:#2c7da0;color:white;border:none;padding:7px 18px;border-radius:40px;font-weight:bold;cursor:pointer;font-size:14px}

<script>
    const EXAM_ID      = 'de3';
    const EXAM_NAME    = 'An toàn vệ sinh viên';
    const DEFAULT_LIMIT = 30;
    const FULL_RAW = [{"text": "Luật an toàn vệ sinh lao động 2015 quy định an toàn vệ sinh viên phải có những tiêu chuẩn nào sau đây?", "options": ["a. Người có kiến thức đầy đủ về an toàn vệ sinh lao động, được chủ doanh nghiệp tín nhiệm.", "b. Người có thâm niên công tác từ 5 năm trở lên và phải có kiến thức về an toàn vệ sinh lao động, nhiệt tình với công việc.", "c. Là người lao động có trình độ chuyên môn cao, nhiệt tình, gương mẫu và có kiến thức đầy đủ về an toàn vệ sinh lao động.", "d. Là người lao động trực tiếp sản xuất, am hiểu chuyên môn, kỹ thuật an toàn vệ sinh lao động, tự nguyện, gương mẫu trong việc chấp hành các quy định về an toàn vệ sinh lao động và được người lao động trong tổ bầu ra."], "ans": "d"}, {"text": "Luật an toàn vệ sinh lao động 2015 quy định mỗi tổ sản xuất trong các cơ sở sản xuất, kinh doanh phải có ít nhất bao nhiêu an toàn vệ sinh viên kiêm nhiệm trong giờ làm việc?", "options": ["a. 01 An toàn vệ sinh viên.", "b. 02 An toàn vệ sinh viên.", "c. 03 An toàn vệ sinh viên."], "ans": "a"}, {"text": "Luật an toàn vệ sinh lao động 2015, khi ra quyết định thành lập mạng lưới an toàn vệ sinh viên người sử dụng lao động có phải lấy ý kiến Ban Chấp hành công đoàn cơ sở không?", "options": ["a. Có.", "b. Không.", "c. Nếu thấy cần thiết."], "ans": "a"}, {"text": "Luật an toàn vệ sinh lao động 2015 quy định An toàn vệ sinh viên hoạt động dưới sự quản lý và hướng dẫn của ai?", "options": ["a. Người sử dụng lao động.", "b. Ban chấp hành công đoàn cơ sở.", "c. Hội đồng an toàn, vệ sinh lao động cơ sở.", "d. Người sử dụng lao động và BCH công đoàn cơ sở."], "ans": "b"}, {"text": "Luật an toàn vệ sinh lao động 2015, quy định An toàn vệ sinh viên có quyền gì sau đây về an toàn, vệ sinh lao động?", "options": ["a. Được học tập, bồi dưỡng nâng cao trình độ chuyên môn, nghiệp vụ, phương pháp hoạt động.", "b. Được cung cấp thông tin đầy đủ về biện pháp bảo đảm an toàn, vệ sinh lao động tại nơi làm việc.", "c. Được yêu cầu người lao động trong tổ ngừng làm việc nếu thấy có nguy cơ trực tiếp gây sự cố, tai nạn lao động.", "d. Tất cả các quyền trên."], "ans": "d"}, {"text": "An toàn vệ sinh viên không có quyền nào sau đây về an toàn, vệ sinh lao động?", "options": ["a. Được dành một phần thời gian làm việc để thực hiện các nhiệm vụ của an toàn, vệ sinh viên.", "b. Được hưởng phụ cấp trách nhiệm.", "c. Được trả lương cho thời gian thực hiện nhiệm vụ của an toàn, vệ sinh viên.", "d. Được yêu cầu công đoàn cơ sở trang bị phương tiện bảo vệ cá nhân cho người lao động."], "ans": "d"}, {"text": "Theo Luật an toàn vệ sinh lao động 2015 quy định An toàn vệ sinh viên có bao nhiêu nghĩa vụ?", "options": ["a. Có 3 nghĩa vụ.", "b. Có 4 nghĩa vụ.", "c. Có 5 nghĩa vụ.", "d. Có 6 nghĩa vụ."], "ans": "c"}, {"text": "Theo Luật an toàn vệ sinh lao động 2015 quy định An toàn vệ sinh viên có bao nhiêu quyền?", "options": ["a. Có 3 quyền.", "b. Có 4 quyền.", "c. Có 5 quyền.", "d. Có 6 quyền."], "ans": "b"}, {"text": "Theo Luật an toàn vệ sinh lao động 2015 quy định An toàn vệ sinh viên có nghĩa vụ nào sau đây?", "options": ["a. Báo cáo với tổ chức công đoàn hoặc thanh tra lao động khi phát hiện vi phạm về an toàn, vệ sinh lao động tại nơi làm việc.", "b. Kiến nghị với tổ trưởng hoặc cấp trên thực hiện đầy đủ các chế độ bảo hộ lao động, biện pháp bảo đảm an toàn, vệ sinh lao động.", "c. Tham gia xây dựng kế hoạch an toàn vệ sinh lao động hàng năm.", "d. Tất cả các nghĩa vụ trên."], "ans": "d"}, {"text": "Nhiệm vụ nào không phải là nhiệm vụ của An toàn vệ sinh viên?", "options": ["a. Tổ chức kiểm tra định kỳ về công tác an toàn vệ sinh lao động tại doanh nghiệp.", "b. Đôn đốc, nhắc nhở người lao động trong tổ, đội chấp hành các quy tắc về an toàn vệ sinh lao động.", "c. Hướng dẫn người lao động sử dụng phương tiện bảo vệ cá nhân."], "ans": "a"}, {"text": "Ai ban hành Quyết định thành lập và Quy chế hoạt động của mạng lưới An toàn vệ sinh viên?", "options": ["a. Ban chấp hành công đoàn cơ sở.", "b. Ban chấp hành công đoàn cơ sở thống nhất với người sử dụng lao động.", "c. Người sử dụng lao động thống nhất ý kiến với Ban chấp hành công đoàn cơ sở (nếu cơ sở sản xuất, kinh doanh đã thành lập Ban chấp hành công đoàn cơ sở)."], "ans": "c"}, {"text": "Luật an toàn vệ sinh lao động 2015 quy định mức phụ cấp trách nhiệm hàng tháng cho an toàn vệ sinh viên như thế nào?", "options": ["a. Do người sử dụng lao động và Ban chấp hành công đoàn cơ sở thống nhất thỏa thuận và được ghi trong quy chế hoạt động của mạng lưới an toàn vệ sinh viên.", "b. Mức tối thiểu phải bằng 10% tiền lương cở sở.", "c. Mức tối thiểu phải bằng 10% tiền lương tối thiểu vùng.", "d. Mức tương đương với phụ cấp của tổ trưởng tổ sản xuất."], "ans": "a"}, {"text": "Phụ cấp trách nhiệm cho an toàn vệ sinh viên do ai chi trả?", "options": ["a. Do Công đoàn cơ sở chi trả.", "b. Do người sử dụng lao động chi trả.", "c. Do người sử dụng lao động và công đoàn cơ sở cùng chi trả."], "ans": "b"}, {"text": "Nghị định 44/2016/NĐ-CP của Chính phủ ngày 15/5/2016 quy định An toàn vệ sinh viên thuộc đối tượng huấn luyện nhóm nào?", "options": ["a. Nhóm 1.", "b. Nhóm 2.", "c. Nhóm 5.", "d. Nhóm 6."], "ans": "d"}, {"text": "Nghị định 44/2016/NĐ-CP của Chính phủ ngày 15/5/2016 quy định thời gian huấn luyện lần đầu cho an toàn, vệ sinh viên (ngoài nội dung đã huấn luyện về an toàn, vệ sinh lao động) được quy định như thế nào?", "options": ["a. Ít nhất là 4 giờ.", "b. Ít nhất là 8 giờ.", "c. Ít nhất là 16 giờ.", "d. Ít nhất là 24 giờ."], "ans": "a"}, {"text": "Phương pháp hoạt động của An toàn vệ sinh viên là?", "options": ["a. Hàng ngày bám sát, nắm chắc tình hình an toàn, vệ sinh lao động của máy, thiết bị. Phát hiện và xử lý kịp thời các vi phạm về an toàn, vệ sinh lao động.", "b. Kết hợp biện pháp vận động, thuyết phục, ngăn chặn kịp thời các hiện tượng làm bừa, làm ẩu.", "c. Gương mẫu chấp hành các yêu cầu về an toàn, vệ sinh lao động để làm gương cho tập thể.", "d. Tất cả các phương pháp trên."], "ans": "d"}, {"text": "Nghị định 44/2016/NĐ-CP của Chính     function getAnswerIndex(question, ansLetter) {
        const letters = ['a','b','c','d','e','đ'];
        let idx = letters.indexOf(ansLetter.toLowerCase());
        if (idx !== -1 && idx < question.options.length) return idx;
        return 0;
    }
    const FULL_QUESTIONS = FULL_RAW.map((q,idx) => ({
        id: idx+1,
        text: `Câu ${idx+1}: ${q.text}`,
        options: q.options,
        correct: getAnswerIndex(q, q.ans)
    }));

    let currentQuestions=[], userAnswers=[], answerStatus=[];
    let currentLimit=DEFAULT_LIMIT, currentMode='shuffle', currentStart=1;

    const container     = document.getElementById('questionsContainer');
    const answeredSpan  = document.getElementById('answeredCount');
    const correctSpan   = document.getElementById('correctCount');
    const wrongSpan     = document.getElementById('wrongCount');
    const resetBtn      = document.getElementById('resetExamBtn');
    const applyBtn      = document.getElementById('applyModeBtn');
    const pkgBtns       = document.querySelectorAll('.pkg-btn');
    const shuffleRadio  = document.querySelector('input[value="shuffle"]');
    const sequentialRadio = document.querySelector('input[value="sequential"]');
    const startInput    = document.getElementById('startQuestion');

    function shuffleArray(arr){
        for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
        return arr;
    }
    function getSequentialQuestions(limit,start){
        let startIdx=Math.max(1,Math.min(start,FULL_QUESTIONS.length-limit+1));
        let sel=[];
        for(let i=0;i<limit;i++){let qi=startIdx-1+i;if(qi<FULL_QUESTIONS.length)sel.push({...FULL_QUESTIONS[qi]});}
        return sel;
    }
    function generateExam(limit,mode,start){
        if(mode==='shuffle') return shuffleArray([...FULL_QUESTIONS]).slice(0,limit);
        return getSequentialQuestions(limit,start);
    }
    function updateStats(){
        let answered=userAnswers.filter(a=>a!==null).length;
        let correct=answerStatus.filter(s=>s==='correct').length;
        let wrong=answerStatus.filter(s=>s==='wrong').length;
        answeredSpan.innerText=answered; correctSpan.innerText=correct; wrongSpan.innerText=wrong;
    }
    function handleAnswer(idx,selectedOpt){
        const q=currentQuestions[idx]; if(!q) return;
        userAnswers[idx]=selectedOpt;
        answerStatus[idx]=(selectedOpt===q.correct)?'correct':'wrong';
        renderQuestions(); updateStats();
    }
    window.handleAnswerSelect=(qIndex,optVal)=>{
        if(qIndex>=0&&qIndex<currentQuestions.length) handleAnswer(qIndex,parseInt(optVal));
    };
    function renderQuestions(){
        if(!container) return;
        if(!currentQuestions.length){container.innerHTML='<div style="padding:40px;text-align:center;">Đang tải...</div>';return;}
        let html='';
        for(let i=0;i<currentQuestions.length;i++){
            const q=currentQuestions[i],userChoice=userAnswers[i],fbStatus=answerStatus[i];
            const optsHtml=q.options.map((opt,optIdx)=>{
                const letter=String.fromCharCode(97+optIdx);
                const isChecked=(userChoice===optIdx);
                const optText=opt.replace(/^[a-đ]\.\s*/i,'');
                return `<div class="option" onclick="document.getElementById('q_${i}_opt_${optIdx}').click();">
                    <input type="radio" name="q_${i}" id="q_${i}_opt_${optIdx}" value="${optIdx}" ${isChecked?'checked':''} onchange="window.handleAnswerSelect(${i},${optIdx})">
                    <label for="q_${i}_opt_${optIdx}">${letter}. ${optText}</label>
                </div>`;
            }).join('');
            let feedbackHtml='';
            if(fbStatus==='correct') feedbackHtml=`<div class="feedback correct">✅ Đúng rồi!</div>`;
            else if(fbStatus==='wrong'){
                const correctLetter=String.fromCharCode(97+q.correct);
                feedbackHtml=`<div class="feedback wrong">❌ Sai. Đáp án đúng: <b>${correctLetter.toUpperCase()}</b></div>`;
            }
            html+=`<div class="question-card"><div class="question-text">${q.text}</div><div class="options">${optsHtml}</div>${feedbackHtml}</div>`;
        }
        container.innerHTML=html;
    }
    function loadExam(){
        let limit=Math.min(currentLimit,FULL_QUESTIONS.length);
        currentQuestions=generateExam(limit,currentMode,currentStart);
        userAnswers=new Array(currentQuestions.length).fill(null);
        answerStatus=new Array(currentQuestions.length).fill(null);
        renderQuestions(); updateStats();
    }
    function changePackage(limit){
        currentLimit=Math.min(limit,FULL_QUESTIONS.length); loadExam();
        pkgBtns.forEach(btn=>{
            const bl=parseInt(btn.getAttribute('data-limit'),10);
            btn.classList.toggle('active',bl===limit||(limit>=FULL_QUESTIONS.length&&bl>=FULL_QUESTIONS.length));
        });
    }
    function applyModeAndStart(){
        currentMode=shuffleRadio.checked?'shuffle':'sequential';
        let ns=parseInt(startInput.value,10); if(isNaN(ns))ns=1;
        currentStart=Math.max(1,Math.min(ns,FULL_QUESTIONS.length));
        loadExam();
    }
    pkgBtns.forEach(btn=>btn.addEventListener('click',()=>{
        let lv=parseInt(btn.getAttribute('data-limit'),10);
        if(lv>FULL_QUESTIONS.length) lv=FULL_QUESTIONS.length;
        changePackage(lv);
    }));
    resetBtn.addEventListener('click',loadExam);
    applyBtn.addEventListener('click',applyModeAndStart);

    currentLimit=Math.min(DEFAULT_LIMIT,FULL_QUESTIONS.length);
    loadExam();
    pkgBtns.forEach(btn=>{
        let val=parseInt(btn.getAttribute('data-limit'),10);
        if(val===currentLimit) btn.classList.add('active');
    });

</script>
