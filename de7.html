<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:#eef2f7;padding:16px;color:#1e293b}
.container{max-width:1300px;margin:0 auto;background:white;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.1);overflow:hidden;padding:20px 24px 32px}
.header{text-align:center;border-bottom:3px solid #2c7da0;margin-bottom:20px;background:#fff9e6;border-radius:16px 16px 0 0;padding:16px 16px 18px}
.company{font-size:18px;font-weight:800;color:#dc2626;margin-bottom:6px}
.title{font-size:24px;font-weight:800;color:#1e3a8a;text-transform:uppercase}
.quiz-controls{background:#f8fafc;padding:14px 18px;border-radius:50px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}

.mode-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#eef2f7;padding:7px 16px;border-radius:50px}
.mode-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:500;font-size:14px}
.mode-label input{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.start-input{display:flex;align-items:center;gap:7px;font-size:14px}

.apply-btn{background:#2c7da0;color:white;border:none;padding:7px 18px;border-radius:40px;font-weight:bold;cursor:pointer;font-size:14px}
.apply-btn:hover{background:#1f5e7a}
.reset-btn{background:#f97316;color:white;border:none;padding:8px 22px;border-radius:40px;font-weight:bold;cursor:pointer;font-size:14px}

.questions-area{display:flex;flex-direction:column;gap:22px}

.option input{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.option label{font-size:.93rem;cursor:pointer;flex:1;line-height:1.4}

<script>
    const EXAM_ID      = 'de7';
    const EXAM_NAME    = 'Pháp luật ATVSLĐ';
    const DEFAULT_LIMIT = 146;
    const FULL_RAW = [{"text": "Theo quy định, người lao động có quyền rời bỏ nơi làm việc khi thấy rõ nguy cơ có thể xảy ra TNLĐ, đe doạ đến tính mạng hoặc sức khỏe của mình nhưng:", "options": ["a. Phải báo ngay với người quản lý trực tiếp mà vẫn được trả đủ tiền lương và không bị coi là vi phạm kỷ luật lao động.", "b. Phải báo ngay với người quản lý trực tiếp, được trả 50% tiền lương và không bị coi là vi phạm kỷ luật lao động.", "c. Phải báo ngay với người quản lý trực tiếp, được trả 30% tiền lương và không bị coi là vi phạm kỷ luật lao động."], "ans": "a"}, {"text": "Theo quy định, người lao động làm việc theo Hợp đồng lao động có bao nhiêu quyền và nghĩa vụ?", "options": ["a. 6 quyền và 3 nghĩa vụ.", "b. 7 quyền và 3 ngĩa vụ.", "c. quyền và 4 nghĩa vụ."], "ans": "a"}, {"text": "Điểm nào sau đây không thuộc nghĩa vụ của người lao động theo quy định?", "options": ["a. Chấp hành nội quy, quy trình, biện pháp bảo đảm ATVSLĐ.", "b. Tham gia đoàn điều tra Tai nạn lao động tại doanh nghiệp.", "c. Sử dụng và bảo quản các phương tiện bảo vệ cá nhân đã được trang cấp.", "d. Tuân thủ các giao kết về ATVSLĐ trong hợp đồng lao động."], "ans": "b"}, {"text": "Theo quy định, khi xảy ra nguy cơ gây mất ATVSLĐ tại nơi làm việc thì người lao động phải làm gì?", "options": ["a. Ngăn chặn nguy cơ trực tiếp gây mất ATVSLĐ, hành vi vi phạm quy định ATVSLĐ tại nơi làm việc.", "b. Báo cáo kịp thời với người có trách nhiệm.", "c. Chủ động tham gia ứng cứu khắc phục sự cố, TNLĐ theo phương án xử lý sự cố, ứng cứu khẩn cấp hoặc khi có lệnh của người sử dụng lao động hoặc cơ quan nhà nước có thẩm quyền.", "d. Cả 3 đáp án trên."], "ans": "d"}, {"text": "Người lao động có trách nhiệm gì dưới đây trong việc bảo đảm an toàn, vệ sinh lao động tại nơi làm việc?", "options": ["a. Chấp hành quy định, nội quy, quy trình, yêu cầu về an toàn, vệ sinh lao động.", "b.Tuân thủ pháp luật và nắm vững kiến thức, kỹ năng về các biện pháp bảo đảm an toàn, vệ sinh lao động tại nơi làm việc.", "c. Phải tham gia huấn luyện an toàn, vệ sinh lao động trước khi sử dụng các máy, thiết bị, vật tư, chất có yêu cầu nghiêm ngặt về an toàn, vệ sinh lao động.", "d. Tất cả các trách nhiệm trên."], "ans": "d"}, {"text": "Theo quy định, người sử dụng lao động có mấy quyền và nghĩa vụ về công tác ATVSLĐ?", "options": ["a. 6 quyền và 3 nghĩa vụ.", "b. 5 quyền và 3 ngĩa vụ.", "c. 4 quyền và 7 nghĩa vụ."], "ans": "c"}, {"text": "Người sử dụng lao động có nghĩa vụ nào dưới đây?", "options": ["a. Tổ chức huấn luyện, hướng dẫn các quy định, nội quy, quy trình, biện pháp bảo đảm ATVSLĐ.", "b. Trang bị đầy đủ phương tiện, công cụ lao động, bảo đảm ATVSLĐ.", "c. Thực hiện việc chăm sóc sức khỏe, khám phát hiện BNN; thực hiện đầy đủ chế độ đối với người bị TNLĐ, BNN cho người lao động.", "d. Tất cả các nghĩa vụ trên."], "ans": "d"}, {"text": "Tuyên truyền, phổ biến hoặc huấn luyện cho người lao động quy định, nội quy, quy trình về ATVSLĐ, biện pháp phòng, chống yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc có liên quan đến đến công việc, nhiệm vụ được giao là trách nhiệm của ai?", "options": ["a. Người sử dụng lao động.", "b. Người làm công tác ATVSLĐ.", "c. Người làm công tác y tế.", "d. An toàn vệ sinh viên."], "ans": "a"}, {"text": "Để tổ chức cho người lao động tham gia hoạt động cải thiện điều kiện lao động, xây dựng văn hóa an toàn lao động tại nơi làm việc, người sử dụng lao động phải phối hợp với ai?", "options": ["a. Ban Chấp hành Công đoàn cơ sở.", "b. Hội đồng an toàn vệ sinh lao động cơ sở.", "c. Người làm công tác an toàn vệ sinh lao động.", "d. Mạng lưới an toàn vệ sinh viên."], "ans": "a"}, {"text": "Trong các đáp án dưới đây, đáp án nào thuộc quyền và trách nhiệm của tổ chức công đoàn trong công tác ATVSLĐ?", "options": ["a. Tham gia với cơ quan nhà nước xây dựng chính sách, pháp luật về ATVSLĐ.", "b. Phối hợp với cơ quan quản lý nhà nước tổ chức phong trào quần chúng làm công tác an toàn, vệ sinh lao động.", "c. Phối hợp với cơ quan nhà nước thanh tra, kiểm tra, giám sát việc thực hiện chính sách pháp luật về ATVSLĐ có liên quan đến quyền, nghĩa vụ của người lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Khi phát hiện nơi làm việc có yếu tố có hại hoặc yếu yếu tố nguy hiểm đến sức khỏe, tính mạng của con người trong quá trình lao động, tổ chức công đoàn thực hiện ngay việc gì sau đây?", "options": ["a. Yêu cầu cơ quan, tổ chức, doanh nghiệp, cá nhân có trách nhiệm thực hiện ngay biện pháp bảo đảm an toàn, vệ sinh lao động, thực hiện các biện pháp khắc phục kể cả trường hợp phải tạm ngừng hoạt động.", "b. Yêu cầu cơ quan, tổ chức, doanh nghiệp, cá nhân có trách nhiệm thực hiện các biện pháp khắc phục kể cả trường hợp phải tạm ngừng hoạt động.", "c. Yêu cầu cơ quan, tổ chức, doanh nghiệp, cá nhân có trách nhiệm thực hiện ngay biện pháp bảo đảm an toàn, vệ sinh lao động, thực hiện các biện pháp khắc phục."], "ans": "a"}, {"text": "Trong công tác an toàn, vệ sinh lao động, Công đoàn cơ sở có quyền, trách nhiệm nào sau đây?", "options": ["a. Tham gia, phối hợp với người sử dụng lao động tổ chức kiểm tra công tác an toàn, vệ sinh lao động.", "b. Giám sát và yêu cầu người sử dụng lao động thực hiện đúng các quy định về an toàn, vệ sinh lao động.", "c. Đại diện cho tập thể người lao động thương lượng, ký kết và giám sát việc thực hiện điều khoản về an toàn, vệ sinh lao động trong thỏa ước lao động tập thể.", "d. Tham gia, phối hợp với người sử dụng lao động điều tra tai nạn lao động và giám sát việc giải quyết chế độ, đào tạo nghề và bố trí công việc cho người bị tai nạn lao động, bệnh nghề nghiệp.", "e. Tất cả các quyền và trách nhiệm trên."], "ans": "e"}, {"text": "\"Đối thoại với người sử dụng lao động để giải quyết các vấn đề liên quan đến quyền, nghĩa vụ của người lao động, người sử dụng lao động về an toàn, vệ sinh lao động\" là quyền và trách nhiệm của ai?", "options": ["a. Bộ phận y tế.", "b. Công đoàn cơ sở.", "c. Bộ phận an toàn, vệ sinh lao động.", "d. Mạng lưới an toàn, vệ sinh viên."], "ans": "b"}, {"text": "Tr ật tại thời điểm bị tai nạn lao động, bệnh nghề nghiệp.", "d. Cả a, c"], "ans": "d"}, {"text": "Thời gian nghỉ dưỡng sức, phục hồi sức khỏe đối với người lao động bị tai nạn lao động, bệnh nghề nghiệp như thế nào?", "options": ["a. Tối đa 10 ngày đối với trường hợp bị TNLĐ, BNN có mức suy giảm khả năng lao động từ 51% trở lên.", "b. Tối đa 07 ngày đối với trường hợp bị TNLĐ, BNN có mức suy giảm khả năng lao động từ 31% đến 50%.", "c. Tối đa 05 ngày đối với trường hợp bị TNLĐ, BNN có mức suy giảm khả năng lao động từ 15% đến 30%.", "d. Cả a, b và c"], "ans": "d"}, {"text": "Người sử dụng lao động thực hiện bồi thường, trợ cấp đối với người bị TNLĐ, BNN trong thời hạn bao lâu kể từ ngày có kết luận của Hội đồng giám định y khoa về mức suy giảm khả năng lao động?", "options": ["a. 05 ngày", "b.07 ngày", "c. 10 ngày"], "ans": "a"}, {"text": "Trong trường hợp người sử dụng lao động không đóng bảo hiểm TNLĐ, BNN cho người lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc, khi người lao động bị TNLĐ, BNN thì người sử dụng lao động phải chi trả cho người lao động các khoản sau:", "options": ["a. Bồi thường hoặc trợ cấp theo quy định trách nhiệm của người sử dụng lao động đối với người bị TNLĐ, BNN và trả khoản tiền tương ứng với chế độ bảo hiểm tai nạn lao động, bệnh nghề nghiệp.", "b. Bồi thường hoặc trợ cấp theo quy định trách nhiệm của người sử dụng lao động đối với người bị TNLĐ, BNN.", "c. Bồi thường hoặc trợ cấp theo quy định trách nhiệm của người sử dụng lao động đối với người bị TNLĐ, BNN và trả 50% khoản tiền tương ứng với chế độ bảo hiểm tai nạn lao động, bệnh nghề nghiệp."], "ans": "a"}, {"text": "Hiện nay, Việt Nam có bao nhiêu bệnh nghề nghiệp được hưởng bảo hiểm xã hội?", "options": ["a. 32", "b. 34", "c. 35", "d. 36"], "ans": "c"}, {"text": "Thời hạn điều tra BNN không quá bao nhiêu ngày kể từ ngày quyết định thành lập đoàn điều tra bệnh nghề nghiệp có hiệu lực thi hành?", "options": ["a. 30 ngày", "b. 45 ngày", "c. 50 ngày"], "ans": "b"}, {"text": " , "options": ["a. Là yếu tố gây mất an toàn, làm tổn thương hoặc gây tử vong cho con người trong quá trình lao động.", "b. Là yếu tố gây bệnh tật, làm suy giảm sức khỏe con người trong quá trình lao động.", "c. Là yếu tố gây mất an toàn, làm tổn thương cho con người trong quá trình lao động."], "ans": "b"}, {"text": "Luật An toàn, vệ sinh lao động năm 2015 quy định quan trắc môi trường lao động là gì?", "options": ["a. Là hoạt động thu thập số liệu đo lường các yếu tố trong môi trường lao động tại nơi làm việc để có các biện pháp giảm thiểu tác hại đối với sức khỏe, phòng chống bệnh nghề nghiệp.", "b. Là hoạt động thu thập, phân tích, đánh giá số liệu đo lường các yếu tố trong môi trường xung quanh.", "c. Là hoạt động phân tích, đánh giá số liệu đo lường các yếu tố trong môi trường lao động tại nơi làm việc để có các biện pháp giảm thiểu tác hại đối với sức khỏe, phòng chống bệnh nghề nghiệp.", "d. Là hoạt động thu thập, phân tích, đánh giá số liệu đo lường các yếu tố trong môi trường lao động tại nơi làm việc để có các biện pháp giảm thiểu tác hại đối với sức khỏe, phòng chống bệnh nghề nghiệp."], "ans": "d"}, {"text": "Để kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc người sử dụng lao động phải làm gì?", "options": ["a. Tổ chức đánh giá, kiểm soát chất lượng sản phẩm tại nơi làm việc để đề ra các biện pháp kỹ thuật an toàn, vệ sinh lao động, chăm sóc sức khỏe cho người lao động.", "b. Tổ chức đánh giá, kiểm soát yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc để đề ra các biện pháp kỹ thuật an toàn, vệ sinh lao động, chăm sóc sức khỏe cho người lao động; Thực hiện các biện pháp khử độc, khử trùng cho người lao động làm việc ở nơi có yếu tố gây nhiễm độc, nhiễm trùng.", "c. Có biện pháp khắc phục, kiểm soát nhằm bảo đảm an toàn, vệ sinh lao động.", "d. Cả 3 đáp án trên."], "ans": "b"}, {"text": "Người sử dụng lao động phải kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc bảo đảm nguyên tắc nào?", "options": ["a. Theo dõi các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc.", "b. Thường xuyên giám sát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc.", "c. Thường xuyên theo dõi, giám sát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc.", "d. Thường xuyên theo dõi, giám sát các yếu tố nguy hiểm tại nơi làm việc."], "ans": "c"}, {"text": "Người sử dụng lao động phải bố trí người hoặc bộ phận được phân công chịu trách nhiệm về kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc; đối với các cơ sở sản xuất, kinh doanh, phải quy định việc kiểm soát các yếu tố nguy hiểm, yếu tố có hại đến đâu?", "options": ["a. Từng tổ, đội, phân xưởng.", "b. Doanh nghiệp.", "c. Cơ quan quản lý."], "ans": "a"}, {"text": "Ngay sau khi có kết quả quan trắc môi trường lao động để đánh giá yếu tố có hại và kết quả kiểm tra, đánh giá, quản lý yếu tố nguy hiểm tại nơi làm việc, người sử dụng lao động phải làm gì?", "options": ["a. Thông báo công khai cho người lao động tại nơi quan trắc môi trường lao động và nơi được kiểm tra, đánh giá, quản lý yếu tố nguy hiểm.", "b. Cung cấp thông tin khi tổ chức công đoàn, cơ quan, tổ chức có thẩm quyền yêu cầu.", "c. Có biện pháp khắc phục, kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc nhằm bảo đảm an toàn, vệ sinh lao động, chăm sóc sức khỏe cho người lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Theo anh, chị để kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc NSDLĐ phải triển khai các nội dung gì?", "options": ["a. Nhận diện và đánh giá các yếu tố nguy hiểm, yếu tố có hại.", "b. Xác định Mục tiêu và các biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại.", "c. Triển khai và đánh giá hiệu quả các biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Theo anh, chị cơ sở nhận diện và đánh giá các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc phải dựa trên các nội dung gì?", "options": ["a. Phân tích đặc điểm, điều kiện lao động, quy trình làm việc có liên quan và kết quả kiểm tra nơi làm việc; Khảo sát người lao động về những yếu tố có thể gây tổn thương, bệnh tật, làm suy giảm sức khỏe của họ tại nơi làm việc.", "b. Khảo sát người sử dụng lao động về những yếu tố có thể gây tổn thương, bệnh tật, làm suy giảm sức khỏe của họ tại nơi làm việc.", "c. Phân tích quy trình công nghệ có liên quan tại nơi làm việc.", "d. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Nghị định 39/2016/NĐ-CP quy định trường hợp không nhận diện và đánh giá được đầy đủ, chính xác bằng cảm quan các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc thì phải làm gì?", "options": ["a. Phải sử dụng máy, thiết bị phù hợp để đo, kiểm các yếu tố nguy hiểm, yếu tố có hại; Lập hồ sơ vệ sinh lao động.", "b. Phải sử dụng máy, thiết bị phù hợp để đo, kiểm các yếu tố nguy hiểm, yếu tố có hại; Lập hồ sơ vệ sinh môi trường lao động đối với các yếu tố có hại, phòng chống bệnh nghề nghiệp theo mẫu quy định tại Phụ lục I ban hành kèm theo Nghị định 39/2016/NĐ-CP.", "c. Phải lập hồ sơ vệ sinh môi trường lao động đối với các yếu tố có hại, phòng chống bệnh nghề nghiệp theo mẫu quy định tại Phụ lục I ban hành kèm theo Nghị định 39/2016/NĐ-CP."], "ans": "b"}, {"text": "Căn cứ vào việc nhận diện, đánh giá các yếu tố nguy hiểm, yếu tố có hại, người sử dụng lao động xác định Mục tiêu và các biện pháp phù hợp để phòng, chống tác hại của các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc, theo thứ tự ưu tiên nào?", "options": ["a. Loại trừ các yếu tố nguy hiểm, yếu tố có hại ngay từ khâu thiết kế nhà xưởng, lựa chọn công nghệ, thiết bị, nguyên vật liệu; Ngăn chặn, hạn chế sự tiếp xúc, giảm thiểu tác hại của các yếu tố nguy hiểm, yếu tố có hại bằng việc sử dụng các biện pháp kỹ thuật và áp dụng các biện pháp tổ chức, hành chính.", "b. Loại trừ sự tiếp xúc, giảm thiểu tác hại của các yếu tố nguy hiểm, yếu tố có hại bằng việc sử dụng các biện pháp kỹ thuật và áp dụng các biện pháp tổ chức, hành chính.", "c. Giảm thiểu các yếu tố nguy hiểm, yếu tố có hại ngay từ khâu thiết kế nhà xưởng, lựa chọn công nghệ, thiết bị, nguyên vật liệu."], "ans": "a"}, {"text": "Để triển khai và đánh giá hiệu quả các biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại thì người sử dụng lao động hướng dẫn biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc cho ai?", "options": ["a. Người lao động.", "b. Cán bộ quản lý.", "c. Người làm công tác an toàn, vệ sinh lao động.", "d. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Để triển khai và đánh giá hiệu quả các biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại, người sử dụng lao động phải lập kế hoạch và tổ chức kiểm tra, đánh giá hiệu quả các biện pháp phòng, chống yếu tố nguy hiểm, yếu tố có hại ít nhất bao lâu?", "options": ["a. 01 lần/năm; đối với cơ sở sản xuất, kinh doanh, phải được kiểm tra, đánh giá đến cấp tổ, đội, phân xưởng.", "b. 02 lần/năm; đối với cơ sở sản xuất, kinh doanh, phải được kiểm tra, đánh giá đến cấp tổ, đội, phân xưởng.", "c. 03 lần/năm; đối với cơ sở sản xuất, kinh doanh, phải được kiểm tra, đánh giá đến cấp tổ, đội, phân xưởng.", "d. 04 lần/năm; đối với cơ sở sản xuất, kinh doanh, phải được kiểm tra, đánh giá đến cấp tổ, đội, phân xưởng."], "ans": "a"}, {"text": "Việc kiểm tra biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc gồm các nội dung nào sau đây?", "options": ["a. Tình trạng an toàn, vệ sinh lao động của máy, thiết bị, nhà xưởng, kho tàng và nơi làm việc; Kiến thức và khả năng của người lao động trong xử lý sự cố, ứng cứu khẩn cấp.", "b. Việc sử dụng, bảo quản phương tiện bảo vệ cá nhân; phương tiện phòng cháy, chữa cháy; các loại thuốc thiết yếu, phương tiện sơ cứu, cấp cứu tại chỗ; thực hiện chế độ bảo hộ lao động, chăm sóc sức khỏe người lao động.", "c. Việc quản lý, sử dụng máy, thiết bị, vật tư, chất có yêu cầu nghiêm ngặt về an toàn, vệ sinh lao động; thực hiện kiến nghị của các đoàn thanh tra, kiểm tra an toàn, vệ sinh lao động, Điều tra tai nạn lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Việc đánh giá hiệu quả biện pháp phòng, chống yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc gồm các nội dung nào sau đây?", "options": ["a. Việc tổ chức triển khai các biện pháp phòng, chống yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc; Kết quả cải thiện điều kiện lao động.", "b. Việc xây dựng các biện pháp phòng, chống các yếu tố nguy hiểm, yếu tố có hại tai nơi làm việc.", "c. Kết quả quan trắc môi trường lao động.", "d. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Luật An toàn, vệ sinh lao động năm 2015 quy định người sử dụng lao động phải có phương án xử lý sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng, ứng cứu khẩn cấp và định kỳ làm gì?", "options": ["a. Tổ chức diễn tập theo quy định của pháp luật.", "b. Ban hành quy định về phương án xử lý.", "c. Tổ chức thực hành theo quy định.", "d. Tổ chức đánh giá."], "ans": "a"}, {"text": "Phương án xử lý sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng phải được phê duyệt hoặc gửi cơ quan có thẩm quyền phê duyệt và định kỳ tổ chức diễn tập phương án xử lý sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng theo quy định nào?", "options": ["a. Của nhà đầu tư.", "b. Của pháp luật chuyên ngành.", "c. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Luật An toàn, vệ sinh lao động năm 2015 quy định người sử dụng lao động phải trang bị phương tiện kỹ thuật, y tế để bảo đảm ứng cứu, sơ cứu kịp thời khi xảy ra gì?", "options": ["a. Sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng, tai nạn lao động.", "b. Sự cố khủng hoảng tài chính doanh nghiệp.", "c. Sự cố cháy nổ."], "ans": "a"}, {"text": "Phương án xử lý sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng quy định tại Khoản 1 Điều 19 Luật An toàn, vệ sinh lao động gồm các nội dung nào?", "options": ["a. Lực lượng tham gia xử lý sự cố tại chỗ và nhiệm vụ của từng thành viên tham gia; lực lượng hỗ trợ từ các cơ sở sản xuất, kinh doanh lân cận; Cách thức, trình tự xử lý sự cố.", "b. Phương tiện kỹ thuật phải có theo quy định của pháp luật chuyên ngành.", "c. Thiết bị đo lường cần thiết dùng trong quá trình xử lý sự cố (theo quy định hiện hành của pháp luật về đo lường).", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Khi hoạt động của máy, thiết bị, việc sử dụng vật tư, chất, hoạt động lao động tại nơi làm việc có nguy cơ gây tai nạn lao động, sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng người sử dụng lao động phải làm gì?", "options": ["a. Ra lệnh ngừng ngay hoạt động.", "b. Tiếp tục hoạt động.", "c. Hoạt động trong một số trường hợp."], "ans": "a"}, {"text": "Người sử dụng lao động không được buộc người lao động tiếp tục làm công việc hoặc trở lại nơi làm việc nếu các nguy cơ xảy ra tai nạn lao động đe dọa nghiêm trọng tính mạng hoặc sức khỏe của người lao động chưa...?", "options": ["a. Được khắc phục một phần.", "b. Được khắc phục.", "c. Chuẩn bị có sự cố xảy ra."], "ans": "b"}, {"text": "Luật ATVSLĐ quy định người sử dụng lao động phải thực hiện các biện pháp khắc phục, các biện pháp theo phương án xử lý sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng, ứng cứu khẩn cấp để làm gì?", "options": ["a. Tổ chức cứu tài sản và môi trường xung quanh.", "b. Tổ chức cứu người, tài sản, bảo đảm an toàn, vệ sinh lao động cho người lao động, người xung quanh nơi làm việc, tài sản và môi trường.", "c. Đẩy mạnh sản xuất.", "d. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Khi xảy ra sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng, ứng cứu khẩn cấp người sử dụng lao động phải thông báo cho ai?", "options": ["a. Thông báo cho Công an huyện.", "b. Thông báo cho khách hàng.", "c. Kịp thời thông báo cho chính quyền địa phương nơi xảy ra sự cố hoặc ứng cứu khẩn cấp.", "d. Kịp thời thông báo cho người lao động."], "ans": "c"}, {"text": "Khi xảy ra sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng làm chết người hoặc làm bị thương nặng từ 02 người trở lên mà nạn nhân không phải là người lao động thuộc quyền quản lý hoặc có người lao động bị nạn nhưng chưa rõ thương vong thì người sử dụng lao động của cơ sở để xảy ra sự cố phải làm gì?", "options": ["a. Khai báo bằng cách nhanh nhất với Sở Nội vụ, nơi xảy ra sự cố, Khai báo bằng cách nhanh nhất với Công an cấp xã nếu nạn nhân bị chết.", "b. Khai báo cho Phòng Lao động - Việc làm và An toàn lao động.", "c. Khai báo bằng cách nhanh nhất cho Phòng Lao động - Việc làm và An toàn lao động và Công an cấp xã."], "ans": "a"}, {"text": "Trách nhiệm huy động khẩn cấp nhân lực, vật lực và phương tiện để kịp thời ứng phó sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng xảy ra ở cơ sở sản xuất, kinh doanh, địa phương thuộc về ai?", "options": ["a. Sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng xảy ra ở cơ sở sản xuất, kinh doanh, địa phương nào thì người sử dụng lao động, địa phương đó có trách nhiệm huy động.", "b. Người sử dụng lao động.", "c. Người lao động."], "ans": "a"}, {"text": "Luật ATVSLĐ năm 2015 quy định người sử dụng lao động phải thường xuyên phối hợp với Ban Chấp hành Công đoàn cơ sở để tổ chức cho người lao động tham gia hoạt động gì?", "options": ["a. Tham gia cải thiện điều kiện lao động, xây dựng văn hóa an toàn lao động tại nơi làm việc.", "b. Tham gia cải thiện điều kiện kinh doanh.", "c. Tham gia huấn luyện an toàn lao động.", "d. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Luật ATVSLĐ năm 2015 khuyến khích người sử dụng lao động áp dụng các tiêu chuẩn kỹ thuật, hệ thống quản lý tiên tiến, hiện đại và áp dụng công nghệ tiên tiến, công nghệ cao, công nghệ thân thiện với môi trường vào hoạt động sản xuất, kinh doanh nhằm mục đích gì?", "options": ["a. Nâng cao năng suất, chất lượng sản phẩm.", "b. Cải thiện điều kiện lao động, bảo đảm an toàn, vệ sinh lao động cho người lao động.", "c. Nâng cao năng lực cạnh tranh.", "d. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Luật an toàn, vệ sinh lao động năm 2015 quy định quan trắc môi trường lao động là hoạt động thu thập, phân tích, đánh giá số liệu đo lường các yếu tố trong môi trường lao động tại nơi làm việc để có biện pháp gì?", "options": ["a. Để có biện pháp giảm thiểu tác hại đối với sức khỏe, phòng, chống bệnh nghề nghiệp.", "b. Để có biện pháp thay thế.", "c. Để có biện pháp loại trừ."], "ans": "a"}, {"text": "Nghị định 44/2016/NĐ-CP quy định quan trắc môi trường lao động phải thực hiện quan trắc đầy đủ yếu tố có hại được liệt kê trong Hồ sơ vệ sinh lao động do cơ sở lao động lập. Đối với nghề, công việc nặng nhọc độc hại nguy hiểm và đặc biệt nặng nhọc độc hại nguy hiểm, khi quan trắc môi trường lao động phải thực hiện đánh giá các yếu tố nào?", "options": ["a. Đánh giá yếu tố nguy hiểm.", "b. Đánh giá yếu tố có hại theo quy định tại Nghị định này.", "c. Đánh giá gánh nặng lao động và một số chỉ tiêu tâm sinh lý lao động Ec-gô-nô-my quy định tại Khoản 3 Điều 33 Nghị định này."], "ans": "c"}, {"text": "Nghị định 44/2016/NĐ-CP quy định quan trắc môi trường lao động phải bảo đảm các nội dung nào?", "options": ["a. Thực hiện trong thời gian cơ sở lao động đang tiến hành hoạt động sản xuất, kinh doanh.", "b. Lấy mẫu theo phương pháp lấy mẫu cá nhân và vị trí lấy mẫu được đặt tại vùng có khả năng ảnh hưởng đến người lao động.", "c. Đối với quan trắc môi trường lao động bằng phương pháp phát hiện nhanh khi kết quả có nghi ngờ, tổ chức quan trắc môi trường lao động lấy mẫu, phân tích bằng phương pháp phù hợp tại phòng xét nghiệm đủ tiêu chuẩn.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Đối với yếu tố có hại được Bộ trưởng Bộ Y tế quy định giới hạn tiếp xúc cho phép để kiểm soát tác hại đối với sức khỏe người lao động thì người sử dụng lao động phải tổ chức quan trắc môi trường lao động để đánh giá yếu tố có hại ít nhất bao lâu?", "options": ["a. Một lần trong một năm.", "b. Hai lần trong một năm.", "c. Ba lần trong một năm."], "ans": "a"}, {"text": "Người sử dụng lao động phải thường xuyên kiểm soát, quản lý đúng yêu cầu kỹ thuật nhằm bảo đảm an toàn, vệ sinh lao động cho người lao động tại nơi làm việc và bao nhiêu lâu phải tổ chức đánh giá, kiểm tra?", "options": ["a. Ít nhất một lần trong một năm phải tổ chức kiểm tra, đánh giá yếu tố này.", "b. Ít nhất hai lần trong một năm phải tổ chức kiểm tra, đánh giá yếu tố này.", "c. Ít nhất ba lần trong một năm phải tổ chức kiểm tra, đánh giá yếu tố này."], "ans": "a"}, {"text": "Ngay sau khi có kết quả quan trắc môi trường lao động để đánh giá yếu tố có hại và kết quả kiểm tra, đánh giá, quản lý yếu tố nguy hiểm tại nơi làm việc, người sử dụng lao động phải làm gì?", "options": ["a. Thông báo công khai cho người lao động tại nơi quan trắc môi trường lao động và nơi được kiểm tra, đánh giá, quản lý yếu tố nguy hiểm.", "b. Cung cấp thông tin khi tổ chức công đoàn, cơ quan, tổ chức có thẩm quyền yêu cầu.", "c. Có biện pháp khắc phục, kiểm soát các yếu tố nguy hiểm, yếu tố có hại tại nơi làm việc nhằm bảo đảm an toàn, vệ sinh lao động, chăm sóc sức khỏe cho người lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Trường hợp kết quả quan trắc môi trường lao động không bảo đảm, cơ sở lao động thực hiện các giải pháp nào?", "options": ["a. Triển khai biện pháp cải thiện điều kiện lao động, giảm thiểu yếu tố có hại và phòng chống bệnh nghề nghiệp.", "b. Tổ chức khám sức khỏe phát hiện sớm bệnh nghề nghiệp và bệnh liên quan đến nghề nghiệp cho người lao động ở các vị trí có môi trường lao động không đảm bảo.", "c. Bồi dưỡng bằng hiện vật cho người lao động theo quy định của pháp luật về lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Theo Luật ATVSLĐ sự cố kỹ thuật gây mất an toàn, vệ sinh lao động nghiêm trọng là sự cố như thế nào?", "options": ["a. Sự cố kỹ thuật gây mất an toàn, vệ sinh lao động lớn, xảy ra trên diện rộng và vượt khả năng ứng phó của cơ sở sản xuất, kinh doanh, cơ quan, tổ chức, địa phương hoặc liên quan đến nhiều cơ sở sản xuất, kinh doanh, địa phương.", "b. Sự cố kỹ thuật gây mất an toàn, vệ sinh lao động lớn, làm hư hỏng máy, thiết bị và vượt quá giới hạn an toàn kỹ thuật cho phép xảy ra trên diện rộng và vượt khả năng ứng phó của cơ sở sản xuất, kinh doanh, cơ quan, tổ chức, địa phương.", "c. Hư hỏng của máy, thiết bị, vật tư, chất vượt quá giới hạn an toàn kỹ thuật cho phép, xảy ra trong quá trình lao động."], "ans": "a"}, {"text": "Luật ATVSLĐ quy định hằng năm, người sử dụng lao động phải tổ chức khám sức khỏe ít nhất mấy lần cho người lao động?", "options": ["a. Một lần.", "b. Hai lần.", "c. Ba lần."], "ans": "a"}, {"text": "Luật ATVSLĐ quy định, người sử dụng lao động phải tổ chức khám sức khỏe cho người lao động làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm, người lao động là người khuyết tật, người lao động chưa thành niên, người lao động cao tuổi ít nhất bao nhiêu tháng một lần?", "options": ["a. 3 tháng một lần.", "b. 6 tháng một lần.", "c. 12 tháng một lần."], "ans": "b"}, {"text": "Khi khám sức khỏe theo quy định tại khoản 1 Điều 21 Luật ATVSLĐ, lao động nữ phải được khám nội dung gì?", "options": ["a. Phải được khám theo yêu cầu của bác sĩ.", "b. Phải được khám chuyên khoa phụ sản.", "c. Phải được khám theo nguyện vọng cá nhân."], "ans": "b"}, {"text": "Khi khám sức khỏe theo quy định tại khoản 1 Điều 21 Luật ATVSLĐ, người lao động làm việc trong môi trường lao động tiếp xúc với các yếu tố có nguy cơ gây bệnh nghề nghiệp có được khám phát hiện bệnh nghề nghiệp hay không?", "options": ["a. Không được khám.", "b. Phải được khám.", "c. Tùy theo từng điều kiện làm việc."], "ans": "b"}, {"text": "Luật ATVSLĐ quy định người sử dụng lao động phải tổ chức khám sức khỏe cho người lao động trong những trường hợp nào?", "options": ["a. Trước khi bố trí làm việc và trước khi chuyển sang làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hơn.", "b. Sau khi bị tai nạn lao động, bệnh nghề nghiệp đã phục hồi sức khỏe, tiếp tục trở lại làm việc, trừ trường hợp đã được Hội đồng y khoa khám giám định mức suy giảm khả năng lao động.", "c. Tất cả các đáp án trên."], "ans": "c"}, {"text": "Luật ATVSLĐ quy định người sử dụng lao động phải tổ chức khám sức khỏe cho người lao động, khám phát hiện bệnh nghề nghiệp tại cơ sở khám bệnh, chữa bệnh như thế nào?", "options": ["a. Phòng khám tư nhân.", "b. Cơ sở khám, chữa bệnh.", "c. Cơ sở khám bệnh, chữa bệnh bảo đảm yêu cầu, điều kiện chuyên môn kỹ thuật.", "d. Trung tâm nghiên cứu."], "ans": "c"}, {"text": "Luật ATVSLĐ quy định người sử dụng lao động phải đưa người lao động được chẩn đoán mắc bệnh nghề nghiệp đến cơ sở khám bệnh, chữa bệnh như thế nào để điều trị?", "options": ["a. Cơ sở khám bệnh, chữa bệnh đủ điều kiện chuyên môn kỹ thuật để điều trị theo phác đồ điều trị bệnh nghề nghiệp do Bộ trưởng Bộ Y tế quy định.", "b. Cơ sở khám bệnh, chữa bệnh bình thường để điều trị theo phác đồ điều trị bệnh nghề nghiệp do Bộ trưởng Bộ Y tế quy định.", "c. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Chi phí cho hoạt động khám sức khỏe, khám phát hiện bệnh nghề nghiệp, điều trị bệnh nghề nghiệp cho người lao động do người sử dụng lao động chi trả quy định tại các khoản 1, 2, 3 và 5 Điều 21 Luật ATVSLĐ được hạch toán vào chi phí gì?", "options": ["a. Chi phí đầu tư.", "b. Chi phí được trừ khi xác định thu nhập chịu thuế theo Luật thuế thu nhập doanh nghiệp và hạch toán vào chi phí hoạt động thường xuyên đối với cơ quan hành chính, đơn vị sự nghiệp không có hoạt động dịch vụ.", "c. Chi phí hoạt động không thường xuyên."], "ans": "b"}, {"text": "Thông tư 19/2016/TT-BYT quy định nội dung quản lý vệ sinh lao động tại cơ sở lao động bao gồm những nội dung nào?", "options": ["a. Lập và cập nhật hồ sơ vệ sinh lao động của cơ sở lao động; Khám sức khỏe trước khi bố trí việc làm, khám sức khỏe định kỳ, khám phát hiện bệnh nghề nghiệp và khám định kỳ bệnh nghề nghiệp.", "b. Quan trắc môi trường lao động; Kiểm soát, phòng ngừa và giảm thiểu những ảnh hưởng của yếu tố có hại trong môi trường lao động đối với sức khỏe.", "c. Vệ sinh phòng chống dịch bệnh, bảo đảm an toàn thực phẩm, nâng cao sức khỏe tại nơi làm việc.", "d. Bảo đảm đáp ứng yêu cầu về công trình vệ sinh, phúc lợi tại nơi làm việc quy định) tại Phụ lục 1 ban hành kèm theo Thông tư 19/2016/TT-BYT; Tổ chức lực lượng sơ cứu, cấp cứu tai nạn lao động tại nơi làm việc và bảo đảm trang thiết bị sơ cứu, cấp cứu.", "đ. Tất cả các đáp án trên."], "ans": "đ"}, {"text": "Hằng năm, cơ sở lao động sản xuất kinh doanh phải xây dựng nội dung quản lý vệ sinh lao động, quản lý sức khỏe người lao động trong kế hoạch nào?", "options": ["a. Kế hoạch sản xuất kinh doanh.", "b. Kế hoạch an toàn, vệ sinh lao động đối với cơ sở.", "c. Kế hoạch đầu tư tài chính.", "d. Kế hoạch thay đổi dây truyền công nghệ."], "ans": "b"}, {"text": "Việc quản lý, chăm sóc sức khỏe, phòng chống bệnh nghề nghiệp cho người lao động phải được thực hiện từ thời điểm nào?", "options": ["a. Từ thời điểm nhận hồ sơ tuyển dụng.", "b. Từ thời điểm người lao động được tuyển dụng và trong suốt quá trình làm việc tại cơ sở lao động.", "c. Từ thời điểm người lao động được tuyển dụng."], "ans": "b"}, {"text": "NSDLĐ phải bố trí, sắp xếp vị trí việc làm phải phù hợp với tình hình sức khỏe của người lao động, không bố trí người bị bệnh nghề nghiệp vào làm việc tại các vị trí lao động có tiếp xúc với yếu tố có hại gây bệnh nghề nghiệp đó khi nào?", "options": ["a. Khi chưa kiểm soát hoặc giảm thiểu được việc tiếp xúc với các yếu tố có hại này.", "b. Khi chưa kiểm soát hoàn toàn.", "c. Khi đã kiểm soát hoặc giảm thiểu được việc tiếp xúc với các yếu tố này."], "ans": "a"}, {"text": "Thông tư 19/2016/TT-BYT quy định đối tượng phải tham gia huấn luyện sơ cứu, cấp cứu gồm những ai?", "options": ["a. Người làm công tác an toàn lao động.", "b. Người lao động, trừ trường hợp đã có Giấy chứng nhận huấn luyện an toàn vệ sinh lao động; Người được phân công tham gia lực lượng sơ cứu, cấp cứu.", "c. Người làm công tác an toàn, vệ sinh lao động.", "d. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Thông tư 19/2016/TT-BYT quy định người sử dụng lao động phải lập, quản lý, bổ sung những loại hồ sơ, giấy tờ gì liên quan đến sức khỏe của người lao động?", "options": ["a. Hồ sơ vệ sinh lao động, hồ sơ sức khỏe cá nhân của người lao động.", "b. Hồ sơ quản lý tình hình sức khỏe người lao động tại cơ sở lao động, hồ sơ cá nhân bệnh nghề nghiệp (nếu có), hồ sơ sơ cứu, cấp cứu tai nạn lao động (nếu có).", "c. Theo dõi sức khỏe và diễn biến bệnh nghề nghiệp của người lao động.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Thông tư 19/2016/TT-BYT hướng dẫn người sử dụng lao động phải bảo đảm cung cấp đủ các công trình vệ sinh, phúc lợi để sử dụng tại nơi làm việc gồm các cơ sở vệ sinh nào?", "options": ["a. Hố tiêu, hố tiểu, buồng tắm, buồng vệ sinh kinh nguyệt, vòi nước rửa tay, nơi để quần áo, nước uống.", "b. Buồng ngủ theo khu làm việc.", "c. Buồng hút thuốc.", "d. Tất cả các đáp án trên."], "ans": "a"}, {"text": "Người lao động khi làm việc chỉ cần tiếp xúc với một trong những yếu tố nguy hiểm, độc hại nào dưới đây thì được trang bị phương tiện bảo vệ cá nhân (PTBVCN)?", "options": ["a. Tiếp xúc với yếu tố vật lý xấu; Tiếp xúc với bụi và hóa chất độc hại; Tiếp xúc với yếu tố sinh học độc hại, môi trường vệ sinh lao động xấu: Vi rút, vi khuẩn độc hại gây bệnh, côn trùng có hại; Phân, nước, rác, cống rãnh hôi thối; Các yếu tố sinh học độc hại khác.", "b. Làm việc với máy, thiết bị, công cụ lao động, làm việc ở vị trí mà tư thế lao động nguy hiểm dễ gây ra tai nạn lao động.", "c. Làm việc trên cao; làm việc trong hầm lò, nơi thiếu dưỡng khí; làm việc trên sông nước, trong rừng hoặc điều kiện lao động nguy hiểm, độc hại khác.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Người sử dụng lao động khi thực hiện trang cấp phương tiện bảo vệ cá nhân cho người lao động phải bảo đảm các nguyên tắc nào sau đây?", "options": ["a. Đúng chủng loại, đúng đối tượng, đủ số lượng, bảo đảm chất lượng theo tiêu chuẩn, quy chuẩn kỹ thuật quốc gia.", "b. Không phát tiền thay cho việc trang cấp phương tiện bảo vệ cá nhân; không buộc người lao động tự mua hoặc thu tiền của người lao động để mua phương tiện bảo vệ cá nhân.", "c. Hướng dẫn, giám sát người lao động sử dụng phương tiện bảo vệ cá nhân.", "d. Tổ chức thực hiện biện pháp khử độc, khử trùng, tẩy xạ bảo đảm vệ sinh đối với phương tiện bảo vệ cá nhân đã qua sử dụng ở những nơi dễ gây nhiễm độc, nhiễm trùng, nhiễm xạ.", "đ. Tất cả các đáp án trên."], "ans": "đ"}, {"text": "Thông tư 25/2022/TT-BLĐTBXH hướng dẫn người sử dụng lao động căn cứ vào mức độ yêu cầu của từng nghề, công việc cụ thể tại cơ sở của mình, khuyến nghị của nhà sản xuất đối với từ loại phương tiện bảo vệ cá nhân để quyết định gì?", "options": ["a. Để quyết định thời hạn sử dụng phương tiện bảo vệ cá nhân cho phù hợp với tính chất công việc và chất lượng của phương tiện bảo vệ cá nhân.", "b. Để quyết định thời hạn sử dụng, số lượng phương tiện bảo vệ cá nhân cho phù hợp với tính chất công việc và chất lượng của phương tiện bảo vệ cá nhân.", "c. Để quyết định mua sắm trang thiết bị.", "d. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Người sử dụng lao động có được phép cấp phát tiền thay cho việc cấp phát phương tiện bảo vệ cá nhân cho người lao động hoặc giao tiền cho người lao động tự đi mua?", "options": ["a. Nghiêm cấm.", "b. Được phép.", "c. Tùy từng trường hợp."], "ans": "a"}, {"text": "Căn cứ vào quy định về trang bị phương tiện bảo vệ cá nhân được ban hành tại Thông tư 25/2022/TT-BLĐTBXH và thời hạn sử dụng phương tiện bảo vệ cá nhân đã được quyết định, hàng năm, người sử dụng lao động tham khảo ý kiến của ai để lập kế hoạch mua sắm?", "options": ["a. Ý kiến cơ quan quản lý nhà nước.", "b. Ý kiến của khách hàng.", "c. Ý kiến của tổ chức đại diện của người lao động tại cơ sở để lập kế hoạch mua sắm (bao gồm cả dự phòng).", "d. Ý kiến của đại diện người sử dụng lao động."], "ans": "c"}, {"text": "Người lao động làm việc trong điều kiện có yếu tố nguy hiểm, yếu tố có hại được người sử dụng lao động bồi dưỡng bằng hiện vật, việc bồi dưỡng bằng hiện vật theo nguyên tắc nào?", "options": ["a. Giúp tăng cường sức đề kháng và thải độc của cơ thể; Bảo đảm thuận tiện, an toàn, vệ sinh thực phẩm.", "b. Thực hiện trong ca, ngày làm việc, trừ trường hợp đặc biệt do tổ chức lao động không thể tổ chức bồi dưỡng tập trung tại chỗ.", "c. Cả a và b", "d. Cả a, b và không được trả bằng tiền, không được trả vào lương thay cho hiện vật bồi dưỡng."], "ans": "d"}, {"text": "Theo quy định người lao động được hưởng chế độ bồi dưỡng bằng hiện vật khi có đủ các điều kiện nào?", "options": ["a. Làm các nghề, công việc thuộc danh mục nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm và nặng nhọc, độc hại, nguy hiểm do Bộ LĐTB&XH ban hành; Đang làm việc trong môi trường lao động có ít nhất một trong các yếu tố nguy hiểm, độc hại không đạt tiêu chuẩn vệ sinh cho phép theo quy định của Bộ Y tế hoặc trực tiếp tiếp xúc với các nguồn gây bệnh truyền nhiễm.", "b. Làm các nghề, công việc thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm và nặng nhọc, độc hại, nguy hiểm do Bộ Lao động - Thương binh và Xã hội ban hành.", "c. Đang làm việc trong môi trường lao động có các yếu tố nguy hiểm, độc hại.", "d. Tất cả các đáp án trên."], "ans": "b"}, {"text": "Theo quy định việc bồi dưỡng bằng hiện vật được tính theo định suất hàng ngày và có giá trị bằng tiền tương ứng theo các mức nào?", "options": ["a. Mức 1: 10.000 đồng; Mức 2: 15.000 đồng; Mức 3: 20.000 đồng; Mức 4: 25.000 đồng.", "b. Mức 1: 13.000 đồng; Mức 2: 20.000 đồng; Mức 3: 26.000 đồng; Mức 4: 32.000 đồng.", "c. Mức 1: 15.000 đồng; Mức 2: 20.000 đồng; Mức 3: 25.000 đồng; Mức 4: 35.000 đồng.", "d. Mức 1: 20.000 đồng; Mức 2: 25.000 đồng; Mức 3: 30.000 đồng; Mức 4: 35.000 đồng."], "ans": "b"}, {"text": "Thông tư 25/2022/TT-BLĐTBXH theo nguyên tắc trang cấp phương tiện bảo vệ cá nhân thì Người sử dụng lao động lập danh mục và trang cấp phương tiện bảo vệ cá nhân cho người lao động theo danh mục phương tiện bảo vệ cá nhân trang cấp cho người lao động làm nghề, công việc có yếu tố nguy hiểm, yếu tố có hại quy định Phụ lục nào ?", "options": ["a. Phụ lục 1 ban hành kèm theo Thông tư này.", "b. Phụ lục 2 ban hành kèm theo Thông tư này.", "c. Phụ lục 3 ban hành kèm theo Thông tư này.", "d. Phụ lục 4 ban hành kèm theo Thông tư này."], "ans": "a"}, {"text": "Thông tư số 25/2022/TT-BLĐTBXH hướng dẫn thực hiện phương tiện bảo vệ cá nhân gồm những phương tiện gì?", "options": ["a. Phương tiện bảo vệ đầu; Phương tiện bảo vệ mắt, mặt; Phương tiện bảo vệ thính giác; Phương tiện bảo vệ cơ quan hô hấp.", "b. Phương tiện bảo vệ tay; Phương tiện bảo vệ chân; Phương tiện bảo vệ thân thể; Phương tiện chống ngã cao.", "c. Phương tiện chống điện giật, điện từ trường, tia phóng xạ; Phương tiện chống đuối nước; Các loại phương tiện bảo đảm an toàn, vệ sinh lao động khác.", "d. Tất cả các đáp án trên."], "ans": "d"}, {"text": "Luật an toàn, vệ sinh lao động năm 2015 quy định máy, thiết bị, vật tư, chất có yêu cầu nghiêm ngặt về an toàn, vệ sinh lao động là?", "options": ["a. Máy, thiết bị, vật tư, chất có nguy cơ xảy ra tai nạn lao động.", "b. Lưu giữ, vận chuyển, bảo quản, sử dụng nhưng trong quá trình lao động, sản xuất vẫn tiềm ẩn khả năng xảy ra tai nạn lao động, bệnh nghề nghiệp, gây hậu quả nghiêm trọng đến sức khỏe, tính mạng con người.", "c. Máy, thiết bị, vật tư, chất trong điều kiện lưu giữ, vận chuyển, bảo quản, sử dụng hợp lý, đúng mục đích và đúng theo hướng dẫn của nhà sản xuất nhưng trong quá trình lao động, sản xuất vẫn tiềm ẩn khả năng xảy ra tai nạn lao động, bệnh nghề nghiệp, gây hậu quả nghiêm trọng đến sức khỏe, tính mạng con người.", "d. Là máy, thiết bị, vật tư, chất hay xảy ra tai nạn lao động."], "ans": "c"}, {"text": "Luật an toàn, vệ sinh lao động năm 2015 quy định người sử dụng lao động lập phương án bảo đảm an toàn, vệ sinh lao động phải có các nội dung nào?", "options": ["a. Địa điểm, quy mô công trình, cơ sở; Liệt kê, mô tả chi tiết các hạng mục trong công trình, cơ sở.", "b. Các biện pháp cụ thể nhằm loại trừ, giảm thiểu yếu tố ng     function getAnswerIndex(question, ansLetter) {
        const letters = ['a','b','c','d','e','đ'];
        let idx = letters.indexOf(ansLetter.toLowerCase());
        if (idx !== -1 && idx < question.options.length) return idx;
        return 0;
    }
    const FULL_QUESTIONS = FULL_RAW.map((q,idx) => ({
        id: idx+1,
        text: `Câu ${idx+1}: ${q.text}`,
        options: q.options,
        correct: getAnswerIndex(q, q.ans)
    }));

    let currentQuestions=[], userAnswers=[], answerStatus=[];
    let currentLimit=DEFAULT_LIMIT, currentMode='shuffle', currentStart=1;

    const container     = document.getElementById('questionsContainer');
    const answeredSpan  = document.getElementById('answeredCount');
    const correctSpan   = document.getElementById('correctCount');
    const wrongSpan     = document.getElementById('wrongCount');
    const resetBtn      = document.getElementById('resetExamBtn');
    const applyBtn      = document.getElementById('applyModeBtn');
    const pkgBtns       = document.querySelectorAll('.pkg-btn');
    const shuffleRadio  = document.querySelector('input[value="shuffle"]');
    const sequentialRadio = document.querySelector('input[value="sequential"]');
    const startInput    = document.getElementById('startQuestion');

    function shuffleArray(arr){
        for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
        return arr;
    }
    function getSequentialQuestions(limit,start){
        let startIdx=Math.max(1,Math.min(start,FULL_QUESTIONS.length-limit+1));
        let sel=[];
        for(let i=0;i<limit;i++){let qi=startIdx-1+i;if(qi<FULL_QUESTIONS.length)sel.push({...FULL_QUESTIONS[qi]});}
        return sel;
    }
    function generateExam(limit,mode,start){
        if(mode==='shuffle') return shuffleArray([...FULL_QUESTIONS]).slice(0,limit);
        return getSequentialQuestions(limit,start);
    }
    function updateStats(){
        let answered=userAnswers.filter(a=>a!==null).length;
        let correct=answerStatus.filter(s=>s==='correct').length;
        let wrong=answerStatus.filter(s=>s==='wrong').length;
        answeredSpan.innerText=answered; correctSpan.innerText=correct; wrongSpan.innerText=wrong;
    }
    function handleAnswer(idx,selectedOpt){
        const q=currentQuestions[idx]; if(!q) return;
        userAnswers[idx]=selectedOpt;
        answerStatus[idx]=(selectedOpt===q.correct)?'correct':'wrong';
        renderQuestions(); updateStats();
    }
    window.handleAnswerSelect=(qIndex,optVal)=>{
        if(qIndex>=0&&qIndex<currentQuestions.length) handleAnswer(qIndex,parseInt(optVal));
    };
    function renderQuestions(){
        if(!container) return;
        if(!currentQuestions.length){container.innerHTML='<div style="padding:40px;text-align:center;">Đang tải...</div>';return;}
        let html='';
        for(let i=0;i<currentQuestions.length;i++){
            const q=currentQuestions[i],userChoice=userAnswers[i],fbStatus=answerStatus[i];
            const optsHtml=q.options.map((opt,optIdx)=>{
                const letter=String.fromCharCode(97+optIdx);
                const isChecked=(userChoice===optIdx);
                const optText=opt.replace(/^[a-đ]\.\s*/i,'');
                return `<div class="option" onclick="document.getElementById('q_${i}_opt_${optIdx}').click();">
                    <input type="radio" name="q_${i}" id="q_${i}_opt_${optIdx}" value="${optIdx}" ${isChecked?'checked':''} onchange="window.handleAnswerSelect(${i},${optIdx})">
                    <label for="q_${i}_opt_${optIdx}">${letter}. ${optText}</label>
                </div>`;
            }).join('');
            let feedbackHtml='';
            if(fbStatus==='correct') feedbackHtml=`<div class="feedback correct">✅ Đúng rồi!</div>`;
            else if(fbStatus==='wrong'){
                const correctLetter=String.fromCharCode(97+q.correct);
                feedbackHtml=`<div class="feedback wrong">❌ Sai. Đáp án đúng: <b>${correctLetter.toUpperCase()}</b></div>`;
            }
            html+=`<div class="question-card"><div class="question-text">${q.text}</div><div class="options">${optsHtml}</div>${feedbackHtml}</div>`;
        }
        container.innerHTML=html;
    }
    function loadExam(){
        let limit=Math.min(currentLimit,FULL_QUESTIONS.length);
        currentQuestions=generateExam(limit,currentMode,currentStart);
        userAnswers=new Array(currentQuestions.length).fill(null);
        answerStatus=new Array(currentQuestions.length).fill(null);
        renderQuestions(); updateStats();
    }
    function changePackage(limit){
        currentLimit=Math.min(limit,FULL_QUESTIONS.length); loadExam();
        pkgBtns.forEach(btn=>{
            const bl=parseInt(btn.getAttribute('data-limit'),10);
            btn.classList.toggle('active',bl===limit||(limit>=FULL_QUESTIONS.length&&bl>=FULL_QUESTIONS.length));
        });
    }
    function applyModeAndStart(){
        currentMode=shuffleRadio.checked?'shuffle':'sequential';
        let ns=parseInt(startInput.value,10); if(isNaN(ns))ns=1;
        currentStart=Math.max(1,Math.min(ns,FULL_QUESTIONS.length));
        loadExam();
    }
    pkgBtns.forEach(btn=>btn.addEventListener('click',()=>{
        let lv=parseInt(btn.getAttribute('data-limit'),10);
        if(lv>FULL_QUESTIONS.length) lv=FULL_QUESTIONS.length;
        changePackage(lv);
    }));
    resetBtn.addEventListener('click',loadExam);
    applyBtn.addEventListener('click',applyModeAndStart);

    currentLimit=Math.min(DEFAULT_LIMIT,FULL_QUESTIONS.length);
    loadExam();
    pkgBtns.forEach(btn=>{
        let val=parseInt(btn.getAttribute('data-limit'),10);
        if(val===currentLimit) btn.classList.add('active');
    });

</script>
