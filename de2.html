<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phòng cháy chữa cháy – ATVSLĐ VSH</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:#eef2f7;padding:16px;color:#1e293b}
.container{max-width:1300px;margin:0 auto;background:white;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.1);overflow:hidden;padding:20px 24px 32px}
.header{text-align:center;border-bottom:3px solid #2c7da0;margin-bottom:20px;background:#fff9e6;border-radius:16px 16px 0 0;padding:16px 16px 18px}
.company{font-size:18px;font-weight:800;color:#dc2626;margin-bottom:6px}
.title{font-size:24px;font-weight:800;color:#1e3a8a;text-transform:uppercase}
.quiz-controls{background:#f8fafc;padding:14px 18px;border-radius:50px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.package-buttons{display:flex;gap:10px;flex-wrap:wrap}
.pkg-btn{background:#e2e8f0;border:none;padding:7px 16px;font-weight:bold;font-size:.9rem;border-radius:40px;cursor:pointer;transition:all .2s;color:#1e293b}
.pkg-btn.active{background:#2c7da0;color:white}
.mode-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#eef2f7;padding:7px 16px;border-radius:50px}
.mode-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:500;font-size:14px}
.mode-label input{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.start-input{display:flex;align-items:center;gap:7px;font-size:14px}
.start-input input{width:65px;padding:5px 8px;border-radius:30px;border:1px solid #cbd5e1;text-align:center;font-size:.9rem}
.apply-btn{background:#2c7da0;color:white;border:none;padding:7px 18px;border-radius:40px;font-weight:bold;cursor:pointer;font-size:14px}
.apply-btn:hover{background:#1f5e7a}
.reset-btn{background:#f97316;color:white;border:none;padding:8px 22px;border-radius:40px;font-weight:bold;cursor:pointer;font-size:14px}
.stats{display:flex;justify-content:space-between;background:#e6f4f1;padding:10px 20px;border-radius:50px;margin-bottom:20px;font-weight:600;flex-wrap:wrap;gap:10px;font-size:14px}
.questions-area{display:flex;flex-direction:column;gap:22px}
.question-card{background:white;border-radius:20px;border:1px solid #e2edf2;padding:18px 22px;box-shadow:0 2px 8px rgba(0,0,0,.02)}
.question-text{font-weight:700;font-size:1rem;margin-bottom:14px;color:#0f3b4c;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px;margin-left:8px}
.option{display:flex;align-items:center;gap:12px;cursor:pointer;padding:5px 10px;border-radius:40px;transition:background .12s}
.option:hover{background:#f1f9fe}
.option input{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.option label{font-size:.93rem;cursor:pointer;flex:1;line-height:1.4}
.feedback{margin-top:12px;padding:8px 16px;border-radius:50px;font-size:.88rem;font-weight:500;display:inline-block}
.feedback.correct{background:#d1fae5;color:#065f46;border-left:4px solid #10b981}
.feedback.wrong{background:#fee2e2;color:#991b1b;border-left:4px solid #ef4444}
footer{text-align:center;margin-top:32px;font-size:.78rem;color:#5e7c8c;border-top:1px solid #e2edf2;padding-top:16px}
@media(max-width:700px){.container{padding:12px}.quiz-controls{flex-direction:column;align-items:stretch}}</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="company">Luyện thi chủ đề</div>
    <div class="title">Phòng cháy chữa cháy</div>
  </div>

  <div class="quiz-controls">
    <div class="package-buttons">
      <button data-limit="10" class="pkg-btn">10 câu</button>
            <button data-limit="20" class="pkg-btn">20 câu</button>
            <button data-limit="30" class="pkg-btn">30 câu</button>
            <button data-limit="50" class="pkg-btn">50 câu</button>
            <button data-limit="60" class="pkg-btn">60 câu</button>
            
    </div>
    <div class="mode-controls">
      <label class="mode-label"><input type="radio" name="orderMode" value="shuffle" checked> XÁO TRỘN</label>
      <label class="mode-label"><input type="radio" name="orderMode" value="sequential"> THEO THỨ TỰ</label>
      <div class="start-input">
        <label>Bắt đầu từ câu:</label>
        <input type="number" id="startQuestion" min="1" value="1">
      </div>
      <button id="applyModeBtn" class="apply-btn">ÁP DỤNG</button>
      <button id="resetExamBtn" class="reset-btn">LÀM LẠI</button>
    </div>
  </div>

  <div class="stats">
    <span>📋 Đã trả lời: <strong id="answeredCount">0</strong></span>
    <span>✅ Đúng: <strong id="correctCount">0</strong> &nbsp;|&nbsp; ❌ Sai: <strong id="wrongCount">0</strong></span>
  </div>

  <div id="questionsContainer" class="questions-area"></div>
  <footer>⚡ Chọn đáp án → hiển thị kết quả đúng/sai ngay tức thì.</footer>
</div>
<script>
    const EXAM_ID      = 'de2';
    const EXAM_NAME    = 'Phòng cháy chữa cháy';
    const DEFAULT_LIMIT = 60;
    const FULL_RAW = [{"text": "Luật phòng cháy, chữa cháy và cứu nạn, cứu hộ áp dụng đối với chủ thể nào?", "options": ["a. Tất cả các cơ sở hoạt động, sản xuất, kinh doanh trên lãnh thổ nước Cộng hòa xã hội chủ nghĩa Việt Nam.", "b. Tất cả các cơ quan, tổ chức hoạt động trên lãnh thổ nước Cộng hòa xã hội chủ nghĩa Việt Nam.", "c. Tất cả các cơ quan, tổ chức, hộ gia đình, cá nhân hoạt động, sinh sống trên lãnh thổ nước Cộng hòa xã hội chủ nghĩa Việt Nam.", "d. Tất cả các tổ chức, cá nhân hoạt động, sinh sống trong và ngoài nước."], "ans": "c"}, {"text": "Luật phòng cháy, chữa cháy và cứu nạn, cứu hộ số 55/2024/QH15 được ban hành vào ngày 29/11/2024, theo đó quy định ngày nào hằng năm là 'Ngày toàn dân phòng cháy, chữa cháy và cứu nạn cứu hộ'?", "options": ["a. Ngày 15 tháng 5", "b. Ngày 28 tháng 4", "c. Ngày 4 tháng 10", "d. Ngày 29 tháng 11"], "ans": "c"}, {"text": "Khi có cháy, yêu cầu nào sau đây được ưu tiên sử dụng cho chữa cháy?", "options": ["a. Mọi nguồn nước chữa cháy.", "b. Mọi nguồn nước và chất chữa cháy.", "c. Các vật liệu chữa cháy phải được ưu tiên sử dụng cho chữa cháy.", "d. Mọi nguồn nước và các vật dụng khác."], "ans": "b"}, {"text": "Theo quy định của pháp luật, phát biểu nào sau đây đúng về chế độ, chính sách đối với người được huy động, người tham gia chữa cháy, cứu nạn, cứu hộ?", "options": ["a. Người được huy động, người tham gia chữa cháy, cứu nạn, cứu hộ không thuộc lực lượng phòng cháy, chữa cháy và cứu nạn, cứu hộ không được hưởng chế độ bồi dưỡng, hỗ trợ khi tham gia chữa cháy, cứu nạn, cứu hộ.", "b. Người được huy động, người tham gia phòng cháy, chữa cháy, cứu nạn, cứu hộ mà bị tai nạn, hy sinh, bị thương, bị tổn hại sức khỏe, bị tổn thất về tài sản được hưởng chế độ, chính sách theo quy định của pháp luật.", "c. Chỉ những người tham gia bảo hiểm y tế khi được huy động, tham gia phòng cháy, chữa cháy, cứu nạn, cứu hộ mà bị tai nạn, bị thương mới được hưởng chế độ theo quy định của pháp luật.", "d. Tất cả các phương án trên."], "ans": "b"}, {"text": "Việc trang bị phương tiện phòng cháy, chữa cháy, cứu nạn, cứu hộ đối với cơ sở được quy định như thế nào?", "options": ["a. Người đứng đầu cơ sở quyết định hoặc đề xuất người có thẩm quyền quyết định trang bị cho lực lượng PCCC và CNCH cơ sở, chuyên ngành thuộc phạm vi quản lý.", "b. Cơ sở không phải trang bị nếu đã có lực lượng dân phòng.", "c. Ủy ban nhân dân cấp xã phải trang bị toàn bộ cho mọi cơ sở.", "d. Cơ quan Công an có trách nhiệm trang bị trực tiếp cho mọi cơ sở."], "ans": "a"}, {"text": "Trình tự xử lý ban đầu của lực lượng tại chỗ khi phát hiện cháy nên được thực hiện như thế nào?", "options": ["a. Báo động cháy 🡪 ngắt điện 🡪 dùng bình chữa cháy, cát, nước dập cháy 🡪 gọi 114.", "b. Báo động cháy 🡪 gọi 114 🡪 ngắt điện 🡪 dùng bình chữa cháy, cát, nước dập cháy.", "c. Ngắt điện 🡪 báo động cháy 🡪 dùng bình chữa cháy, cát, nước dập cháy🡪 gọi 114.", "d. Gọi 114 🡪 Ngắt điện 🡪 báo động cháy 🡪 dùng bình chữa cháy, cát, nước dập cháy."], "ans": "a"}, {"text": "Phát biểu nào sau đây đúng về Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ?", "options": ["a. Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ cơ sở là tổ chức gồm những người tham gia hoạt động phòng cháy chữa cháy, giữ gìn an ninh trật tự nơi cư trú.", "b. Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ cơ sở là lực lượng kiêm nhiệm do người đứng đầu cơ sở thành lập để thực hiện nhiệm vụ PCCC và CNCH tại cơ sở.", "c. Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ chuyên ngành là lực lượng do Công an nhân dân tổ chức để thực hiện nhiệm vụ phòng cháy, chữa cháy, cứu nạn, cứu hộ tại một số cơ sở có nguy hiểm về cháy, nổ.", "d. Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ chuyên ngành là lực lượng gồm đội phòng cháy, chữa cháy và cứu nạn, cứu hộ cơ sở và những người tình nguyện tham gia hoạt động trực tiếp trong công tác phòng cháy chữa cháy."], "ans": "b"}, {"text": "Những đối tượng nào phải mua bảo hiểm cháy, nổ bắt buộc đối với tài sản của mình?", "options": ["a. Tất cả các cơ sở sản xuất, kinh doanh", "b. Tất cả các tổ chức, cơ quan và cá nhân có cơ sở có nguy hiểm về cháy nổ quy định tại Phụ lục II kèm theo Nghị định 105/2025/NĐ-CP", "c. Cơ quan, tổ chức và cá nhân có cơ sở có nguy hiểm về cháy nổ thuộc Phụ lục VII kèm theo Nghị định 105/2025/NĐ-CP, trừ cơ sở thuộc phạm vi quản lý của Bộ Quốc phòng, Bộ Công an phục vụ mục đích quân sự, quốc phòng, an ninh, trật tự.", "d. Cơ quan, tổ chức và cá nhân có cơ sở thuộc danh mục quy định tại Phụ lục VII kèm theo Nghị định 105/2025/NĐ-CP và các cơ sở thuộc phạm vi quản lý của Bộ Quốc phòng, Bộ Công an phục vụ mục đích quân sự, quốc phòng, an ninh, trật tự."], "ans": "c"}, {"text": "Phát biểu nào sau đây đúng về bảo hiểm cháy, nổ bắt buộc?", "options": ["a. Phạt tiền từ 15.000.000 đồng đến 20.000.000 đồng đối với hành vi mua bảo hiểm cháy, nổ bắt buộc không đúng mức phí bảo hiểm cháy, nổ bắt buộc theo quy định đối với cơ sở phải mua bảo hiểm cháy, nổ bắt buộc.", "b. Phạt tiền từ 10.000.000 đồng đến 15.000.000 đồng đối với hành vi mua bảo hiểm cháy, nổ bắt buộc không đủ đối tượng bảo hiểm cháy, nổ bắt buộc hoặc không đúng mức phí bảo hiểm cháy, nổ bắt buộc theo quy định đối với cơ sở phải mua bảo hiểm cháy, nổ bắt buộc.", "c. Phạt tiền từ 30.000.000 đồng đến 40.000.000 đồng đối với hành vi không mua bảo hiểm cháy, nổ bắt buộc đối với cơ sở có nguy hiểm về cháy, nổ theo quy định của pháp luật về phòng cháy, chữa cháy và cứu nạn, cứu hộ.", "d. Phạt tiền từ 40.000.000 đồng đến 50.000.000 đồng đối với hành vi không mua bảo hiểm cháy, nổ bắt buộc đối với cơ sở có nguy hiểm về cháy, nổ theo quy định của pháp luật về phòng cháy, chữa cháy và cứu nạn, cứu hộ."], "ans": "c"}, {"text": "Phát biểu nào sau đây đúng về bảo hiểm cháy, nổ bắt buộc?", "options": ["a. Phạt tiền từ 30.000.000 đồng đến 40.000.000 đồng đối với hành vi không mua bảo hiểm cháy, nổ bắt buộc đối với cơ sở có nguy hiểm về cháy, nổ thuộc nhóm 1 theo quy định của pháp luật về phòng cháy, chữa cháy và cứu nạn, cứu hộ.", "b. Phạt tiền từ 40.000.000 đồng đến 50.000.000 đồng đối với hành vi không mua bảo hiểm cháy, nổ bắt buộc đối với cơ sở có nguy hiểm về cháy, nổ thuộc nhóm 2 theo quy định của pháp luật về phòng cháy, chữa cháy và cứu nạn, cứu hộ.", "c. Phạt tiền từ 10.000.000 đồng đến 15.000.000 đồng đối với hành vi mua bảo hiểm cháy, nổ bắt buộc không đủ đối tượng bảo hiểm cháy, nổ bắt buộc đối với cơ sở phải mua bảo hiểm cháy, nổ bắt buộc", "d. Phạt tiền từ 30.000.000 đồng đến 50.000.000 đồng đối với hành vi không mua bảo hiểm cháy, nổ bắt buộc đối với cơ sở có nguy hiểm về cháy, nổ theo quy định của pháp luật về phòng cháy, chữa cháy và cứu nạn, cứu hộ."], "ans": "d"}, {"text": "Trong hoạt động phòng cháy, chữa cháy và cứu nạn, cứu hộ, nhiệm vụ nào là chính?", "options": ["a. Lấy tuyên truyền là chính.", "b. Lấy phương châm 4 tại chỗ làm chính.", "c. Lấy chữa cháy làm chính.", "d. Lấy phòng ngừa làm chính."], "ans": "d"}, {"text": "Theo quy định hiện hành, 'chữa cháy' được hiểu như thế nào?", "options": ["a. Là tổng hợp các hoạt động, biện pháp, giải pháp để hạn chế, loại trừ nguyên nhân, điều kiện, nguy cơ xảy ra cháy nhằm bảo đảm an toàn, giảm thiểu thiệt hại do cháy gây ra.", "b. Là tổng hợp các hoạt động chống cháy lan, dập tắt đám cháy và các hoạt động khác để giảm thiểu thiệt hại do cháy gây ra.", "c. Chỉ là việc phun nước hoặc chất chữa cháy vào đám cháy.", "d. Chỉ là việc cứu người, cứu tài sản khỏi đám cháy."], "ans": "b"}, {"text": "Nhận định nào dưới đây phản ánh đầy đủ và chính xác nhất các nguyên tắc cơ bản của hoạt động phòng cháy, chữa cháy, cứu nạn, cứu hộ?", "options": ["a. Huy động toàn dân tham gia; lấy chữa cháy là nhiệm vụ trọng tâm; ưu tiên cứu tài sản trước để hạn chế thiệt hại kinh tế; tăng cường ứng dụng công nghệ hiện đại.", "b. Chủ động phòng ngừa, lấy phòng ngừa là chính; chuẩn bị sẵn sàng lực lượng, phương tiện, phương án và điều kiện cần thiết; thống nhất chỉ huy, ưu tiên cứu người, cứu tài sản; phát hiện, ngăn chặn và xử lý nghiêm hành vi vi phạm pháp luật về PCCC và CNCH.", "c. Phát huy vai trò nòng cốt của lực lượng PCCC và CNCH; ưu tiên sử dụng lực lượng chuyên trách thay cho lực lượng tại chỗ; chỉ huy linh hoạt theo từng lực lượng để bảo đảm xử lý nhanh; bảo đảm tính nhân đạo trong cứu nạn, cứu hộ.", "d. Tuân thủ pháp luật Việt Nam; huy động sức mạnh toàn dân; ứng dụng khoa học công nghệ; bảo đảm công bằng, bình đẳng giới; tuy nhiên có thể linh hoạt không xử lý nghiêm đối với vi phạm lần đầu nếu chưa gây hậu quả."], "ans": "b"}, {"text": "Trong hoạt động phòng cháy, chữa cháy, cứu nạn, cứu hộ, nguyên tắc nào dưới đây đúng khi Việt Nam và nước ngoài chưa có điều ước quốc tế liên quan?", "options": ["a. Chỉ thực hiện khi có sự đồng ý của chính quyền địa phương.", "b. Thực hiện theo yêu cầu của phía nước ngoài trong mọi trường hợp.", "c. Thực hiện trên nguyên tắc có đi có lại hoặc yêu cầu đối ngoại nhưng không trái pháp luật Việt Nam, phù hợp với pháp luật và tập quán quốc tế.", "d. Tạm dừng mọi hoạt động phối hợp cho đến khi ký điều ước quốc tế."], "ans": "c"}, {"text": "Nội dung nào sau đây phản ánh đúng nguyên tắc huy động lực lượng trong hoạt động PCCC và CNCH?", "options": ["a. Chỉ lực lượng chuyên trách mới tham gia hoạt động PCCC và CNCH.", "b. Chỉ huy động lực lượng tại chỗ, không cần các lực lượng khác.", "c. Huy động sức mạnh tổng hợp của toàn dân, đồng thời phát huy vai trò nòng cốt của lực lượng PCCC và CNCH.", "d. Giao hoàn toàn trách nhiệm cho người đứng đầu cơ sở."], "ans": "c"}, {"text": "Khi xảy ra cháy, tai nạn, sự cố, nội dung nào sau đây phù hợp nhất với nguyên tắc chỉ huy, điều hành?", "options": ["a. Ưu tiên bảo vệ tài sản trước, sau đó mới tổ chức cứu người.", "b. Chờ lực lượng cấp trên đến mới tổ chức xử lý ban đầu.", "c. Mỗi lực lượng tự triển khai theo kinh nghiệm riêng để tiết kiệm thời gian", "d. Thống nhất chỉ huy, điều hành; phát huy vai trò của lực lượng, phương tiện, hậu cần tại chỗ."], "ans": "d"}, {"text": "Nội dung nào dưới đây thể hiện đúng yêu cầu về giá trị xã hội trong hoạt động PCCC và CNCH?", "options": ["a. Bảo đảm tính nhân đạo, công bằng, bình đẳng giới.", "b. Ưu tiên xử lý theo vị trí công tác và cấp bậc.", "c. Chỉ ưu tiên hỗ trợ lực lượng trực tiếp tham gia chữa cháy.", "d. Tập trung cứu hộ theo mức độ thiệt hại tài sản."], "ans": "a"}, {"text": "Phương án nào sau đây không đúng với các nguyên tắc cơ bản của hoạt động PCCC và CNCH?", "options": ["a. Chủ động phòng ngừa, lấy phòng ngừa là chính.", "b. Huy động sức mạnh tổng hợp của toàn dân.", "c. Ưu tiên cứu người, cứu tài sản khi xảy ra cháy, tai nạn, sự cố.", "d. Chỉ xử lý hành vi vi phạm khi đã gây ra hậu quả đặc biệt nghiêm trọng."], "ans": "d"}, {"text": "Trong một tình huống phối hợp CNCH với lực lượng nước ngoài khi chưa có điều ước quốc tế giữa hai bên, cách xử lý nào đúng nguyên tắc?", "options": ["a. Từ chối phối hợp vì không có điều ước quốc tế.", "b. Phối hợp trên nguyên tắc có đi có lại hoặc yêu cầu đối ngoại, nhưng không trái pháp luật Việt Nam và phù hợp pháp luật, tập quán quốc tế.", "c. Chỉ thực hiện theo thông lệ quốc tế, không cần xét pháp luật Việt Nam.", "d. Giao toàn quyền quyết định cho phía nước ngoài."], "ans": "b"}, {"text": "Theo nguyên tắc hoạt động PCCC và CNCH, phát biểu nào sau đây đúng?", "options": ["a. Hậu cần tại chỗ chỉ có vai trò hỗ trợ, không cần phát huy khi xảy ra sự cố.", "b. Khi xảy ra cháy, mọi nguồn nước và chất chữa cháy phải được ưu tiên cho chữa cháy.", "c. Chỉ lực lượng chuyên trách mới được tham gia cứu nạn, cứu hộ.", "d. Bình đẳng giới không phải là yêu cầu trong hoạt động PCCC và CNCH."], "ans": "b"}, {"text": "Hàng hóa nguy hiểm về cháy, nổ là gì?", "options": ["a. Chỉ gồm chất lỏng, chất khí, chất rắn dễ cháy nổ.", "b. Là hàng hóa có chứa các chất, vật phẩm có nguy cơ cháy, nổ ở dạng khí, lỏng hoặc rắn, khi quản lý, vận chuyển, sử dụng có khả năng gây cháy, nổ.", "c. Là chất lỏng, chất khí,chất rắn, hoặc máy móc dễ xảy ra cháy, nổ.", "d. Chỉ gồm các chất có tính chất đặc biệt nguy hiểm về cháy nổ như xăng, dầu, khí đốt, hóa lỏng."], "ans": "b"}, {"text": "Biện pháp cơ bản trong chữa cháy?", "options": ["a. Huy động nhanh nhất các lực lượng, phương tiện để dập tắt ngay đám cháy.", "b. Tập trung cứu người, cứu tài sản và chống cháy lan.", "c. Thống nhất chỉ huy, điều hành trong chữa cháy.", "d. Cả 3 đáp án đều đúng."], "ans": "d"}, {"text": "Khi tổ chức chữa cháy đối với một đám cháy có nguy cơ phát triển nhanh và lan rộng, việc áp dụng các biện pháp cơ bản phải bảo đảm đồng thời nhiều yêu cầu về chiến thuật, tổ chức lực lượng và điều hành hiện trường. Phương án nào dưới đây phản ánh đầy đủ, toàn diện nhất các nội dung đó?", "options": ["a. Tập trung huy động lực lượng, phương tiện thích hợp để nhanh chóng khống chế đám cháy, không để cháy kéo dài.", "b. Tổ chức cứu người là nhiệm vụ ưu tiên, kết hợp cứu tài sản và triển khai đội hình ngăn chặn cháy lan sang khu vực liền kề.", "c. Kết hợp đầy đủ việc huy động nhanh lực lượng, phương tiện; cứu người, cứu tài sản, chống cháy lan; và bảo đảm thống nhất chỉ huy, điều hành chữa cháy.", "d. Duy trì chế độ chỉ huy tập trung, thống nhất nhằm bảo đảm hiệu quả phối hợp giữa các lực lượng tham gia chữa cháy."], "ans": "c"}, {"text": "Nội dung nào dưới đây phản ánh đúng và đầy đủ nhất biện pháp cơ bản trong phòng cháy, không nhầm lẫn với hoạt động chữa cháy và ứng phó khi sự cố đã xảy ra?", "options": ["a. Quản lý chặt chẽ chất cháy, nguồn lửa, nguồn nhiệt; đồng thời bố trí lực lượng tại chỗ, phương tiện chữa cháy ban đầu để sẵn sàng dập tắt đám cháy ngay khi mới phát sinh.", "b. Bảo đảm các điều kiện an toàn về phòng cháy; thường xuyên, định kỳ kiểm tra để phát hiện sơ hở, thiếu sót; đồng thời tổ chức thoát nạn, cứu người và chống cháy lan khi có cháy xảy ra.", "c. Quản lý chặt chẽ, sử dụng an toàn chất cháy, nguồn lửa, nguồn nhiệt và thiết bị sinh lửa, sinh nhiệt; bảo đảm các điều kiện an toàn về phòng cháy; thường xuyên, định kỳ kiểm tra để phát hiện và khắc phục kịp thời sơ hở, thiếu sót.", "d. Kiểm soát chất cháy và nguồn gây cháy; xây dựng phương án chữa cháy, chuẩn bị phương tiện, tổ chức huấn luyện lực lượng cơ sở nhằm bảo đảm xử lý hiệu quả mọi tình huống cháy, nổ."], "ans": "c"}, {"text": "Khi sử dụng chất chữa cháy để dập một đám cháy mới phát sinh, cách tác động nào dưới đây thường cho hiệu quả khống chế ngọn lửa nhanh nhất?", "options": ["a. Phun trực tiếp vào phần đầu ngọn lửa để làm giảm chiều cao ngọn lửa.", "b. Phun vào gốc ngọn lửa, nơi đám cháy tiếp xúc trực tiếp với vật cháy hoặc bề mặt cháy.", "c. Phun đều vào toàn bộ thân ngọn lửa để hạ nhiệt đồng thời toàn bộ vùng cháy.", "d. Phun chếch lên phía trên ngọn lửa để chất chữa cháy phủ xuống toàn bộ khu vực đang cháy."], "ans": "b"}, {"text": "Đối với cơ sở hoạt động trong khu công nghiệp, khu chế xuất, khu công nghệ cao, phương án nào dưới đây phản ánh đầy đủ nhất yêu cầu về phòng cháy, chữa cháy và cứu nạn, cứu hộ tại cơ sở?", "options": ["a. Chỉ cần thành lập lực lượng PCCC và CNCH cơ sở theo quy định; việc xây dựng phương án và bố trí phương tiện sẽ thực hiện khi có yêu cầu của cơ quan có thẩm quyền.", "b. Phải có phương án bảo đảm an toàn về PCCC và CNCH; việc tổ chức lực lượng, phương tiện được thực hiện tùy theo quy mô sản xuất, không bắt buộc gắn với phương án đã xây dựng.", "c. Thành lập lực lượng PCCC và CNCH cơ sở phù hợp quy định; có phương án bảo đảm an toàn về PCCC và CNCH; đồng thời tổ chức lực lượng, phương tiện phù hợp với phương án đó.", "d. Chỉ cần tổ chức lực lượng, phương tiện chữa cháy tại chỗ đầy đủ; việc thành lập lực lượng PCCC và CNCH cơ sở hoặc xây dựng phương án riêng không phải là yêu cầu bắt buộc nếu đã có nội quy an toàn chung."], "ans": "c"}, {"text": "Theo Luật Phòng cháy, chữa cháy và cứu nạn, cứu hộ hiện hành, nhiệm vụ của lực lượng PCCC và CNCH cơ sở, chuyên ngành và lực lượng dân phòng được quy định theo mấy nhóm nhiệm vụ chính?", "options": ["a. 02 nhóm nhiệm vụ chính.", "b. 04 nhóm nhiệm vụ chính.", "c. 05 nhóm nhiệm vụ chính.", "d. 06 nhóm nhiệm vụ chính."], "ans": "b"}, {"text": "Theo luật hiện hành, đâu là nhận định đúng nhất về các lực lượng phòng cháy, chữa cháy và cứu nạn, cứu hộ?", "options": ["a. Bao gồm lực lượng dân phòng, lực lượng PCCC và CNCH cơ sở, lực lượng PCCC và CNCH chuyên ngành, lực lượng Cảnh sát PCCC và CNCH.", "b. Bao gồm các lực lượng quy định tại phương án A và lực lượng PCCC, CNCH tình nguyện.", "c. Bao gồm lực lượng dân phòng, lực lượng PCCC và CNCH cơ sở, lực lượng Cảnh sát PCCC và CNCH; còn lực lượng chuyên ngành chỉ được tổ chức trong một số trường hợp nên không tính là một lực lượng.", "d. Bao gồm toàn bộ lực lượng nêu tại phương án A và các lực lượng khác trong Công an nhân dân khi được huy động tham gia chữa cháy, cứu nạn, cứu hộ."], "ans": "a"}, {"text": "Đối với đám cháy dầu, mỡ, chất chữa cháy nào dưới đây không nên sử dụng vì có thể làm cháy lan, bắn văng chất cháy và làm tình huống trở nên nghiêm trọng hơn?", "options": ["a. Khí chữa cháy, nếu sử dụng đúng loại và đúng cách.", "b. Bột chữa cháy, trong một số trường hợp có thể dùng để khống chế đám cháy bề mặt.", "c. Nước, do có thể làm dầu mỡ đang cháy bắn tung và lan rộng vùng cháy.", "d. Chăn chiên, tấm phủ chống cháy hoặc biện pháp cách ly oxy khỏi bề mặt cháy."], "ans": "c"}, {"text": "Khi xảy ra cháy tại cơ sở, lực lượng Cảnh sát PCCC và CNCH chưa tới, những người có mặt dưới đây, ai là người chỉ huy chữa cháy?", "options": ["a. Đội trưởng đội phòng cháy và chữa cháy cơ sở.", "b. Người đứng đầu cơ sở bị cháy.", "c. Tổ trưởng tổ sản xuất.", "d. Tổ trưởng tổ bảo vệ."], "ans": "b"}, {"text": "Khi sử dụng bình chữa cháy khí để dập đám cháy mới phát sinh, trình tự thao tác nào dưới đây là đúng và phù hợp nhất?", "options": ["a. Mang bình tiếp cận đám cháy ở cự ly thích hợp, rút chốt hãm, hướng loa phun vào gốc lửa, giữ tư thế an toàn và bóp cò để phun chất chữa cháy.", "b. Rút chốt hãm ngay từ vị trí ban đầu, vừa di chuyển vừa bóp cò để sẵn sàng phun ngay khi tiếp cận đám cháy.", "c. Đưa loa phun hướng lên phần ngọn lửa để làm ngọn lửa tắt nhanh, sau đó mới điều chỉnh dần xuống vùng cháy.", "d. Mang bình đến gần đám cháy, bóp cò trước để kiểm tra áp lực phun, rồi mới lựa chọn vị trí và hướng phun phù hợp."], "ans": "a"}, {"text": "Theo nguyên lý cháy, điều kiện cần để sự cháy xảy ra là phải đồng thời có yếu tố nào sau đây?", "options": ["a. Chất cháy và nguồn nhiệt, vì ôxy luôn tồn tại sẵn trong không khí nên không cần xem là điều kiện bắt buộc.", "b. Nguồn nhiệt và ôxy, vì khi nhiệt độ đủ cao thì mọi vật liệu đều có thể tự bốc cháy.", "c. Chất cháy và ôxy, vì khi đã có hai yếu tố này thì sự cháy có thể tự hình thành.", "d. Nguồn nhiệt, chất cháy và ôxy, trong đó thiếu bất kỳ yếu tố nào thì sự cháy không thể xảy ra."], "ans": "d"}, {"text": "Khi phát hiện bình chữa cháy tại vị trí được trang bị không còn khả năng sử dụng hoặc không bảo đảm tình trạng sẵn sàng hoạt động, cách xử lý nào dưới đây là phù hợp nhất?", "options": ["a. Chủ động mua bình chữa cháy mới để thay thế ngay nhằm bảo đảm luôn có phương tiện tại chỗ", "b. Báo ngay cho cấp trên trực tiếp hoặc cán bộ phụ trách an toàn/PCCC của đơn vị để được kiểm tra, xử lý và thay thế theo quy định", "c. Tạm thời lấy bình chữa cháy ở khu vực khác đưa sang thay thế, sau đó báo lại sau để tránh gián đoạn trang bị", "d. Giữ nguyên hiện trạng vì việc kiểm tra, thay thế bình chữa cháy thuộc trách nhiệm của bộ phận chuyên trách"], "ans": "b"}, {"text": "Dấu hiệu nào cho thấy bình bột chữa cháy còn sử dụng được?", "options": ["a. Kim ở vạch chỉ màu xanh trên đồng hồ áp kế.", "b. Kim ở vạch chỉ màu đỏ trên đồng hồ áp kế.", "c. Kim ở vạch chỉ màu vàng trên đồng hồ áp kế."], "ans": "a"}, {"text": "Nguyên lý chống cháy, nổ thường được hiểu là áp dụng các biện pháp nhằm?", "options": ["a. Hạ thấp tốc độ cháy của vật liệu đến mức nhỏ nhất có thể, nhưng không cần quan tâm đến việc phân tán nhiệt lượng phát sinh.", "b. Phân tán nhanh nhiệt lượng của đám cháy, nhưng không nhất thiết phải tác động đến khả năng bắt cháy hoặc tốc độ cháy của vật liệu.", "c. Vừa hạ thấp tốc độ cháy của vật liệu đến mức tối thiểu, vừa phân tán nhanh nhiệt lượng phát sinh để hạn chế khả năng hình thành và phát triển cháy, nổ.", "d. Chỉ tập trung cô lập khu vực cháy, vì khi đã hạn chế phạm vi cháy thì nguy cơ nổ sẽ tự triệt tiêu."], "ans": "c"}, {"text": "Đâu là phương án phản ánh đầy đủ nhất các nguyên lý cơ bản có thể áp dụng để dập tắt một đám cháy đang xảy ra?", "options": ["a. Chỉ cần làm lạnh thật nhanh vùng cháy, vì khi nhiệt độ giảm thì mọi đám cháy đều sẽ tự tắt.", "b. Cắt sự tiếp xúc giữa chất cháy và chất ôxy hóa; làm giảm nồng độ ôxy hoặc hơi, khí cháy đến giới hạn không duy trì cháy; đồng thời làm lạnh vùng cháy xuống dưới nhiệt độ cháy của vật liệu.", "c. Chủ yếu dùng biện pháp cô lập khu vực cháy và di chuyển vật dễ cháy ra xa để đám cháy tự suy giảm.", "d. Tập trung phun chất chữa cháy vào phần ngọn lửa để triệt tiêu nhanh biểu hiện cháy nhìn thấy được."], "ans": "b"}, {"text": "Dùng chất chữa cháy nào sau đây làm nhiệt độ đám cháy giảm nhanh và pha loãng nồng độ chất cháy, hạn chế sự thâm nhập của ôxy vào vùng cháy?", "options": ["a. Nước.", "b. Bụi nước.", "c. Bọt chữa cháy.", "d. Bột chữa cháy."], "ans": "b"}, {"text": "Để chữa cháy kim loại, chất rắn và chất lỏng phù hợp với đặc tính đám cháy, thường ưu tiên sử dụng loại chất chữa cháy nào sau đây?", "options": ["a. Nước.", "b. Các hợp chất halogen.", "c. Bột chữa cháy.", "d. Bọt chữa cháy."], "ans": "c"}, {"text": "Trong công tác chữa cháy ban đầu tại cơ sở, đâu là nhận định đúng nhất về các phương tiện chữa cháy tại chỗ thường được trang bị?", "options": ["a. Chỉ bao gồm các loại bình chữa cháy xách tay như bình bọt, bình CO2, bình bột; các dụng cụ khác không được coi là phương tiện chữa cháy tại chỗ.", "b. Chủ yếu là các dụng cụ thô sơ như cát, xẻng, thùng, xô đựng nước, câu liêm; các thiết bị có áp lực hoặc bơm không thuộc nhóm này.", "c. Bao gồm các loại bình chữa cháy xách tay, các dụng cụ chữa cháy thô sơ như cát, xẻng, xô, thùng nước, câu liêm, và cả các phương tiện như bơm, bơm tay dùng cho chữa cháy ban đầu.", "d. Chỉ những phương tiện có khả năng phun chất chữa cháy trực tiếp vào đám cháy mới được coi là phương tiện chữa cháy tại chỗ."], "ans": "c"}, {"text": "Trên bình chữa cháy bằng khí CO2, ký hiệu chữ A dùng để chỉ khả năng chữa cháy đối với nhóm cháy nào?", "options": ["a. Chữa chất cháy rắn.", "b. Chữa chất cháy lỏng.", "c. Chữa chất cháy khí.", "d. Chữa cháy điện."], "ans": "a"}, {"text": "Khi thực hiện công việc hàn, cắt có phát sinh tia lửa, nhiệt và xỉ nóng, nội dung nào dưới đây phản ánh đầy đủ nhất các yêu cầu an toàn cần thực hiện?", "options": ["a. Di chuyển vật liệu dễ cháy ra xa khu vực hàn, cắt; có người giám sát và phương tiện chữa cháy tại chỗ.", "b. Có người giám sát, chuẩn bị phương tiện chữa cháy tại chỗ và kiểm tra khu vực khi kết thúc công việc.", "c. Bảo đảm khoảng cách an toàn, di chuyển hoặc che chắn vật liệu dễ cháy; có phương tiện chữa cháy tại chỗ, có người giám sát; kiểm tra lại khu vực hàn, cắt sau khi kết thúc.", "d. Chỉ cần che chắn vật liệu dễ cháy và kiểm tra khu vực sau khi hoàn thành, vì đó là hai nội dung quan trọng nhất."], "ans": "c"}, {"text": "Phương án nào sau đây phản ánh đầy đủ và chính xác nhất các hành vi bị phạt tiền từ 30.000.000 đồng đến 40.000.000 đồng đối với vi phạm về trang bị, lắp đặt phương tiện phòng cháy, chữa cháy, cứu nạn, cứu hộ?", "options": ["a. Trang bị, lắp đặt thiết bị thuộc hệ thống báo cháy không bảo đảm theo quy định.", "b. Trang bị, lắp đặt thiết bị thuộc hệ thống chữa cháy không bảo đảm theo quy định.", "c. Trang bị, lắp đặt thiết bị thuộc hệ thống báo cháy không bảo đảm theo quy định; hoặc trang bị, lắp đặt thiết bị thuộc hệ thống chữa cháy không bảo đảm theo quy định; hoặc trang bị phương tiện chữa cháy, cứu nạn, cứu hộ cơ giới không bảo đảm số lượng hoặc không bảo đảm yêu cầu kỹ thuật theo quy định.", "d. Trang bị, lắp đặt thiết bị thuộc hệ thống báo cháy không bảo đảm theo quy định hoặc trang bị, lắp đặt thiết bị thuộc hệ thống chữa cháy không bảo đảm theo quy định."], "ans": "c"}, {"text": "Theo quy định hiện hành, có bao nhiêu nhóm d. Chỉ D"], "ans": "b"}, {"text": "Quy định nào sau đây áp dụng riêng đối với người được phân công điều khiển xe chữa cháy?\n\nA. Chỉ cần có mặt tại hiện trường khi xe đã xuất phát\n\nB. Được trực ở bất kỳ vị trí nào trong nhà máy miễn bảo đảm thông tin liên lạc\n\nC. Phải trực tại địa điểm bố trí xe chữa cháy\n\nD. Có thể kiêm nhiệm nhiều vị trí nên không bắt buộc cố định nơi trực", "options": ["a. Chỉ A", "b. Chỉ B", "c. Chỉ C", "d. Cả C và D"], "ans": "c"}, {"text": "Một nhà máy nhiệt điện có tổng công suất 2×600 MW. Trong ca trực, lực lượng PCCC và CNCH chuyên ngành được tổ chức và bố trí như sau:\n\nPhương án A. Thành viên được phân công theo xe chữa cháy có thể làm nhiệm vụ khác trong khu vực sản xuất, chỉ cần có mặt khi có báo động.\n\nPhương án B. Người điều khiển xe chữa cháy trực tại phòng điều khiển trung tâm để thuận tiện nhận thông tin sự cố .\n\nPhương án C. Thành viên trong ca trực đang thực hiện nhiệm vụ khác khi có báo động phải hoàn thành công việc đang làm trước khi quay về vị trí phương tiện .\n\nPhương án D. Thành viên được phân công theo xe chữa cháy phải trực tại khu vực quy định; người điều khiển xe chữa cháy phải trực tại vị trí bố trí xe; khi có báo động, mọi thành viên đang làm nhiệm vụ khác phải khẩn trương di chuyển ngay đến vị trí để phương tiện và triển khai nhiệm vụ", "options": ["a. Chỉ A và B", "b. Chỉ B và C", "c. Chỉ D", "d. Cả A, B và C"], "ans": "c"}, {"text": "Một nhà máy nhiệt điện có tổng công suất 2×600 MW. Trong cùng mặt bằng nhà máy có nhiều cơ quan, tổ chức cùng hoạt động (đơn vị vận hành, sửa chữa, dịch vụ kỹ thuật). Phương án nào dưới đây đúng và đầy đủ nhất về tổ chức Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ?\n\nPhương án A. Vì nhà máy hoạt động theo chế độ chuyên trách nên chỉ lực lượng của đơn vị vận hành chính tham gia đội; các cơ quan, tổ chức khác không bắt buộc cử người.\n\n Phương án B. Các cơ quan, tổ chức cùng hoạt động trong cơ sở phải tự thành lập đội riêng của mình, không tham gia đội do người đứng đầu cơ sở thành lập.\n\n Phương án C. Các cơ quan, tổ chức cùng hoạt động trong cơ sở phải cử người tham gia Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ cơ sở do người đứng đầu cơ sở thành lập; thành viên được phân công theo xe chữa cháy phải trực tại khu vực quy định, người điều khiển xe chữa cháy phải trực tại vị trí bố trí xe, khi có báo động phải khẩn trương di chuyển ngay đến vị trí để phương tiện và triển khai nhiệm vụ.\n\n Phương án D. Chỉ cần bảo đảm đủ quân số ca trực của đội chuyên ngành, không cần yêu cầu các cơ quan, tổ chức khác cử người tham gia.", "options": ["a. CHỈ A", " b. CHỈ B", " c. CHỈ C", " d. CHỈ D"], "ans": "c"}, {"text": "Một cơ quan quản lý, vận hành 03 nhà máy điện đều thuộc diện phải thành lập Đội phòng cháy, chữa cháy và cứu nạn, cứu hộ chuyên ngành. Cơ quan này thành lập 01 Đội PCCC và CNCH chuyên ngành đặt tại Nhà máy A. Từ địa điểm bố trí xe chữa cháy của đội tại Nhà máy A đến vị trí xa nhất của từng cơ sở được xác định như sau: - Nhà máy A: 1,6 km - Nhà máy B: 2,9 km - Nhà máy C: 3,0 km. Phương án nào dưới đây đúng nhất theo quy định?\n\nPhương án A. Chỉ Nhà máy A nằm trong bán kính phục vụ; Nhà máy B và C phải thành lập đội chuyên ngành riêng.\n\nPhương án B. Cả 03 nhà máy đều nằm trong bán kính phục vụ không vượt quá 03 km; Nhà máy B và C phải thành lập Tổ PCCC và CNCH thuộc Đội chuyên ngành đặt tại Nhà máy A.\n\nPhương án C. Nhà máy C có khoảng cách đúng bằng 3,0 km nên không đạt điều kiện 'không vượt quá 03 km'.\n\nPhương án D. Vì Nhà máy B và C đã nằm trong bán kính phục vụ nên không cần tổ chức lực lượng PCCC và CNCH tại chỗ", "options": ["a. CHỈ A", "b. CHỈ B", "c. CHỈ C", "d. CHỈ D"], "ans": "b"}];

    function getAnswerIndex(question, ansLetter) {
        const letters = ['a','b','c','d','e','đ'];
        let idx = letters.indexOf(ansLetter.toLowerCase());
        if (idx !== -1 && idx < question.options.length) return idx;
        return 0;
    }
    const FULL_QUESTIONS = FULL_RAW.map((q,idx) => ({
        id: idx+1,
        text: `Câu ${idx+1}: ${q.text}`,
        options: q.options,
        correct: getAnswerIndex(q, q.ans)
    }));

    let currentQuestions=[], userAnswers=[], answerStatus=[];
    let currentLimit=DEFAULT_LIMIT, currentMode='shuffle', currentStart=1;

    const container     = document.getElementById('questionsContainer');
    const answeredSpan  = document.getElementById('answeredCount');
    const correctSpan   = document.getElementById('correctCount');
    const wrongSpan     = document.getElementById('wrongCount');
    const resetBtn      = document.getElementById('resetExamBtn');
    const applyBtn      = document.getElementById('applyModeBtn');
    const pkgBtns       = document.querySelectorAll('.pkg-btn');
    const shuffleRadio  = document.querySelector('input[value="shuffle"]');
    const sequentialRadio = document.querySelector('input[value="sequential"]');
    const startInput    = document.getElementById('startQuestion');

    function shuffleArray(arr){
        for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
        return arr;
    }
    function getSequentialQuestions(limit,start){
        let startIdx=Math.max(1,Math.min(start,FULL_QUESTIONS.length-limit+1));
        let sel=[];
        for(let i=0;i<limit;i++){let qi=startIdx-1+i;if(qi<FULL_QUESTIONS.length)sel.push({...FULL_QUESTIONS[qi]});}
        return sel;
    }
    function generateExam(limit,mode,start){
        if(mode==='shuffle') return shuffleArray([...FULL_QUESTIONS]).slice(0,limit);
        return getSequentialQuestions(limit,start);
    }
    function updateStats(){
        let answered=userAnswers.filter(a=>a!==null).length;
        let correct=answerStatus.filter(s=>s==='correct').length;
        let wrong=answerStatus.filter(s=>s==='wrong').length;
        answeredSpan.innerText=answered; correctSpan.innerText=correct; wrongSpan.innerText=wrong;
    }
    function handleAnswer(idx,selectedOpt){
        const q=currentQuestions[idx]; if(!q) return;
        userAnswers[idx]=selectedOpt;
        answerStatus[idx]=(selectedOpt===q.correct)?'correct':'wrong';
        renderQuestions(); updateStats();
    }
    window.handleAnswerSelect=(qIndex,optVal)=>{
        if(qIndex>=0&&qIndex<currentQuestions.length) handleAnswer(qIndex,parseInt(optVal));
    };
    function renderQuestions(){
        if(!container) return;
        if(!currentQuestions.length){container.innerHTML='<div style="padding:40px;text-align:center;">Đang tải...</div>';return;}
        let html='';
        for(let i=0;i<currentQuestions.length;i++){
            const q=currentQuestions[i],userChoice=userAnswers[i],fbStatus=answerStatus[i];
            const optsHtml=q.options.map((opt,optIdx)=>{
                const letter=String.fromCharCode(97+optIdx);
                const isChecked=(userChoice===optIdx);
                const optText=opt.replace(/^[a-đ]\.\s*/i,'');
                return `<div class="option" onclick="document.getElementById('q_${i}_opt_${optIdx}').click();">
                    <input type="radio" name="q_${i}" id="q_${i}_opt_${optIdx}" value="${optIdx}" ${isChecked?'checked':''} onchange="window.handleAnswerSelect(${i},${optIdx})">
                    <label for="q_${i}_opt_${optIdx}">${letter}. ${optText}</label>
                </div>`;
            }).join('');
            let feedbackHtml='';
            if(fbStatus==='correct') feedbackHtml=`<div class="feedback correct">✅ Đúng rồi!</div>`;
            else if(fbStatus==='wrong'){
                const correctLetter=String.fromCharCode(97+q.correct);
                feedbackHtml=`<div class="feedback wrong">❌ Sai. Đáp án đúng: <b>${correctLetter.toUpperCase()}</b></div>`;
            }
            html+=`<div class="question-card"><div class="question-text">${q.text}</div><div class="options">${optsHtml}</div>${feedbackHtml}</div>`;
        }
        container.innerHTML=html;
    }
    function loadExam(){
        let limit=Math.min(currentLimit,FULL_QUESTIONS.length);
        currentQuestions=generateExam(limit,currentMode,currentStart);
        userAnswers=new Array(currentQuestions.length).fill(null);
        answerStatus=new Array(currentQuestions.length).fill(null);
        renderQuestions(); updateStats();
    }
    function changePackage(limit){
        currentLimit=Math.min(limit,FULL_QUESTIONS.length); loadExam();
        pkgBtns.forEach(btn=>{
            const bl=parseInt(btn.getAttribute('data-limit'),10);
            btn.classList.toggle('active',bl===limit||(limit>=FULL_QUESTIONS.length&&bl>=FULL_QUESTIONS.length));
        });
    }
    function applyModeAndStart(){
        currentMode=shuffleRadio.checked?'shuffle':'sequential';
        let ns=parseInt(startInput.value,10); if(isNaN(ns))ns=1;
        currentStart=Math.max(1,Math.min(ns,FULL_QUESTIONS.length));
        loadExam();
    }
    pkgBtns.forEach(btn=>btn.addEventListener('click',()=>{
        let lv=parseInt(btn.getAttribute('data-limit'),10);
        if(lv>FULL_QUESTIONS.length) lv=FULL_QUESTIONS.length;
        changePackage(lv);
    }));
    resetBtn.addEventListener('click',loadExam);
    applyBtn.addEventListener('click',applyModeAndStart);

    currentLimit=Math.min(DEFAULT_LIMIT,FULL_QUESTIONS.length);
    loadExam();
    pkgBtns.forEach(btn=>{
        let val=parseInt(btn.getAttribute('data-limit'),10);
        if(val===currentLimit) btn.classList.add('active');
    });

</script>
